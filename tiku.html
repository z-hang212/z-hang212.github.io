   addMulti(361, "下列属于国产CPU厂商的是？", ["A. 龙芯中科", "B. 飞腾信息", "C. 华为海思（鲲鹏）", "D. 兆芯", "E. 申威"], ["A","B","C","D","E"], "全部为国产CPU代表厂商：龙芯(LoongArch)、飞腾(ARM)、华为鲲鹏(ARM)、兆芯(x86)、申威(Alpha/SW64)。");
addMulti(362, "下列属于国产操作系统的是？", ["A. 麒麟OS", "B. 统信UOS", "C. 深度Deepin", "D. CentOS", "E. Android"], ["A","B","C"], "麒麟、统信、深度均为国产OS代表，CentOS为红帽社区版，Android为谷歌开发。");
addMulti(363, "在安装国产操作系统时，应考虑的硬件因素包括？", ["A. CPU架构是否支持", "B. 内存容量", "C. 硬盘空间", "D. 显卡型号", "E. 网络接口数"], ["A","B","C","D"], "CPU架构决定OS版本（ARM/x86/龙架构），内存和硬盘满足最低要求，图形界面需显卡驱动支持。网口数量非关键。");
addMulti(364, "以下哪些是国产数据库的代表厂商？", ["A. 海量数据（HighGo）", "B. 达梦数据库", "C. 人大金仓", "D. Oracle", "E. 华为GaussDB"], ["A","B","C","E"], "Oracle为国外产品，其余均为国产数据库核心厂商，涵盖关系型、分布式等不同路线。");
addMulti(365, "在海量数据库中，支持的客户端连接方式包括？", ["A. psql命令行", "B. Navicat for PostgreSQL", "C. JDBC编程连接", "D. ODBC连接", "E. SSH直连"], ["A","B","C","D"], "psql原生客户端，Navicat等GUI工具通过PG协议连接，JDBC/ODBC为编程接口。SSH是通道而非数据库协议。");
addMulti(366, "中创中间件支持的部署方式包括？", ["A. 单机部署", "B. 集群部署", "C. 容器化部署", "D. 虚拟化部署", "E. 云原生部署"], ["A","B","C","D","E"], "中创InforSuite AS全形态支持：物理机单机、多节点集群、Docker/K8s容器、VMware虚机、云平台。");
addMulti(367, "应用迁移前需要进行的评估包括？", ["A. 系统架构分析", "B. 第三方组件兼容性", "C. 性能指标基准", "D. 用户角色权限梳理", "E. 界面UI配色方案"], ["A","B","C","D"], "技术评估范围：架构、依赖库、性能基线、权限模型。UI配色不影响功能运行，非迁移评估项。");
addMulti(368, "'迁移适配'中常见的工作包括？", ["A. 编译源码适配新平台", "B. 替换动态链接库", "C. 修改数据库连接字符串", "D. 调整JVM参数", "E. 重写前端HTML代码"], ["A","B","C","D"], "前端HTML/CSS/JS通常无需修改（除非调用平台特定API）。后端涉及编译、库替换、配置调整、JVM调优。");
addMulti(369, "以下哪些属于'兼容性验证'的内容？", ["A. 页面能否打开", "B. 数据增删改查是否正常", "C. 报表能否导出", "D. 是否支持多浏览器访问", "E. 系统字体是否美观"], ["A","B","C","D"], "兼容性验证关注功能和环境适配：页面访问、CRUD操作、导出功能、浏览器兼容。字体美观属于UI体验非兼容性。");
addMulti(370, "性能调优常见的手段包括？", ["A. 调整JVM堆大小", "B. 优化SQL语句", "C. 增加缓存机制", "D. 扩容服务器节点", "E. 修改用户密码复杂度"], ["A","B","C","D"], "性能调优：JVM内存、SQL索引、Redis缓存、水平扩展。密码策略属于安全范畴，不影响性能。");
addMulti(371, "以下哪些属于国产中间件品牌？", ["A. 中创InforSuite AS", "B. 东方通TongWeb", "C. 金蝶Apusic", "D. WebLogic", "E. Tomcat"], ["A","B","C"], "中创、东方通、金蝶为国产商用Java EE中间件三巨头。WebLogic为Oracle产品，Tomcat为Apache开源。");
addMulti(372, "在国产数据库迁移中，常见的兼容问题有？", ["A. 语法差异（如LIMIT vs ROWNUM）", "B. 存储过程不兼容", "C. 字符集不一致", "D. 默认权限配置不同", "E. 表名大小写敏感"], ["A","B","C","D","E"], "全部为常见问题：分页语法、PL/SQL方言、字符集乱码、权限模型差异、标识符大小写敏感均需验证。");
addMulti(373, "以下哪些命令可用于Linux系统下查看端口占用？", ["A. netstat -tlnp", "B. ss -tlnp", "C. lsof -i :端口", "D. telnet IP 端口", "E. ping IP"], ["A","B","C"], "netstat/ss/lsof均可查看端口监听和占用。telnet测试端口连通性但不显示占用进程，ping测试ICMP不通端口。");
addMulti(374, "应用部署到中创中间件后，若访问失败，可能原因有？", ["A. 端口未开放", "B. 应用未部署成功", "C. 依赖库缺失", "D. 防火墙未放行", "E. DNS解析失败"], ["A","B","C","D","E"], "完整故障链：端口监听、部署状态、应用依赖、网络防火墙、域名解析，任何环节问题都会导致访问失败。");
addMulti(375, "以下属于迁移后'验证'环节的内容有？", ["A. 功能测试", "B. 数据一致性校验", "C. 性能压力测试", "D. 安全扫描", "E. 用户满意度调查"], ["A","B","C","D"], "技术验证包括功能、数据、性能、安全。用户满意度属于项目验收后的长期跟踪，非迁移验证环节。");
addMulti(376, "以下属于国产操作系统基础命令的有？", ["A. ls", "B. chmod +x script.sh", "C. systemctl start sshd", "D. ifconfig", "E. explorer.exe"], ["A","B","C","D"], "ls/chmod/systemctl/ifconfig均为Linux标准命令。explorer.exe为Windows文件管理器，不在国产OS中。");
addMulti(377, "下列哪些工具可用于数据库数据迁移？", ["A. 海量数据自带迁移工具", "B. pg_dump + pg_restore", "C. Navicat数据传输", "D. 自定义Java程序批量导入", "E. Windows复制粘贴"], ["A","B","C","D"], "专业迁移工具、原生逻辑备份、GUI工具、编程脚本均可。复制粘贴不适用于结构化数据迁移。");
addMulti(378, "在信创迁移中，下列哪些是'必须文档'？", ["A. 环境部署清单", "B. 迁移操作手册", "C. 回退方案文档", "D. 会议记录", "E. 人员考勤表"], ["A","B","C"], "技术文档必需：环境配置、操作步骤、回退预案。会议纪要和考勤属于项目管理非技术交付物。");
addMulti(379, "以下哪些属于'中间件配置'中的高级选项？", ["A. 设置session超时", "B. 配置SSL证书", "C. 设置日志轮转策略", "D. 配置集群同步策略", "E. 修改管理员头像"], ["A","B","C","D"], "会话管理、HTTPS加密、日志运维、集群HA均为高级配置。头像修改是用户偏好，非中间件功能。");
addMulti(380, "若迁移过程中遇到'权限被拒绝'，应检查？", ["A. 文件所属用户和组", "B. SELinux是否开启", "C. 文件执行权限（chmod）", "D. 防火墙策略", "E. 中间件启动用户是否为root"], ["A","B","C","E"], "权限问题主要涉及：文件ownership、SELinux上下文、chmod位、进程启动用户。防火墙阻拦返回连接超时而非权限拒绝。");
addMulti(381, "以下哪些属于'性能瓶颈'可能的表现？", ["A. 页面响应慢", "B. CPU持续100%", "C. 数据库锁等待", "D. 日志频繁报错", "E. 用户数量少"], ["A","B","C","D"], "响应延迟、CPU饱和、锁竞争、大量错误日志都是瓶颈信号。用户少时不构成瓶颈。");
addMulti(382, "下列哪些是国产操作系统常见的图形界面？", ["A. UKUI（统信）", "B. Kylin Desktop（麒麟）", "C. GNOME", "D. KDE", "E. Windows Explorer"], ["A","B","C","D"], "UKUI为统信自研，麒麟桌面为UKUI或自研，GNOME/KDE为开源桌面广泛使用。Windows Explorer专属Windows。");
addMulti(383, "关于'国产化替代'，下列说法正确的是？", ["A. 不一定完全替换，可逐步替换", "B. 需保留原系统作为回退方案", "C. 应优先选择已通过认证的产品", "D. 可完全忽略兼容性测试", "E. 必须同时更换硬件和软件"], ["A","B","C"], "分阶段替换、保留回退、选认证产品是正确做法。兼容性测试必须做，硬件和软件可不同步。");
addMulti(384, "若数据库迁移后出现中文乱码，应检查？", ["A. 源库字符集", "B. 目标库字符集", "C. 客户端连接字符集", "D. 应用程序编码设置", "E. 服务器地区语言设置"], ["A","B","C","D","E"], "乱码全链路排查：源端存储字符集、目标端存储、连接时charset、应用读写编码、OS locale设置。");
addMulti(385, "以下哪些属于国产中间件的特性？", ["A. 支持Java EE规范", "B. 可热部署应用", "C. 支持JNDI数据源", "D. 提供管理控制台", "E. 仅支持Windows"], ["A","B","C","D"], "国产中间件全面支持Java EE、热部署、JNDI、Web控制台。均支持Linux/Windows多平台。");
addMulti(386, "在Linux系统中，下列哪些命令可用于重启服务？", ["A. systemctl restart service_name", "B. service service_name restart", "C. /etc/init.d/service_name restart", "D. reboot", "E. shutdown now"], ["A","B","C"], "前三种为单服务重启命令，reboot/shutdown为系统重启。题目要求重启服务而非系统。");
addMulti(387, "以下哪些是'迁移风险'控制措施？", ["A. 制定详细回退方案", "B. 分阶段实施迁移", "C. 多人复核关键步骤", "D. 在测试环境先行验证", "E. 临时禁用日志记录"], ["A","B","C","D"], "回退预案、灰度迁移、复审、充分测试均为有效风控。禁用日志会丢失审计线索，增加风险。");
addMulti(388, "以下哪些是国产CPU与x86相比的特点？", ["A. 自主可控", "B. 部分生态较弱", "C. 性能已接近主流水平", "D. 依赖国外授权", "E. 开发工具链较成熟"], ["A","B","C"], "国产CPU优势在自主可控，部分生态（如软件包）仍需完善，性能已追平主流。x86工具链更成熟但非国产特点。");
addMulti(389, "在麒麟系统中，安装RPM包的命令有？", ["A. rpm -ivh package.rpm", "B. yum install package.rpm", "C. dnf install package.rpm", "D. apt install package.rpm", "E. pip install package"], ["A","B","C"], "麒麟服务器版使用RPM包，可用rpm/yum/dnf。apt用于deb包，pip用于Python包。");
addMulti(390, "关于'数据迁移工具'，正确说法有？", ["A. 能自动转换SQL语法", "B. 支持增量迁移", "C. 有图形化界面或命令行模式", "D. 不能保证100%无差错", "E. 必须人工核对关键数据"], ["A","B","C","D","E"], "迁移工具虽强大但无法保证完美，SQL自动转换、增量同步、双模式界面，最终需人工核对一致性。");
addMulti(391, "中创中间件启动失败，可能原因有？", ["A. 端口冲突", "B. JVM内存不足", "C. 配置文件语法错误", "D. 缺少依赖包", "E. 操作系统版本过低"], ["A","B","C","D","E"], "启动失败多因素：端口占用、JVM堆不足、XML配置错误、缺失lib、OS不兼容，逐项排查。");
addMulti(392, "以下哪些是'应用迁移规范'中强调的内容？", ["A. 文档齐全", "B. 步骤可追溯", "C. 有回退机制", "D. 避免修改核心业务逻辑", "E. 不记录操作日志"], ["A","B","C","D"], "规范强调：完整文档、操作留痕、可回退、最小改动核心业务。操作日志必须记录，不可忽略。");
addMulti(393, "信创环境中，常见的'适配'类型包括？", ["A. 编译适配（源码重编）", "B. 配置适配（连接字符串、路径）", "C. 依赖适配（替换.so/.dll）", "D. 用户界面适配", "E. 数据库索引适配"], ["A","B","C","E"], "源码编译、配置文件修改、动态库替换、数据库对象调整是主要适配工作。界面一般无需适配。");
addMulti(394, "若出现'OutOfMemoryError'，应如何处理？", ["A. 增加JVM堆内存", "B. 优化代码减少对象创建", "C. 启用GC日志排查", "D. 升级操作系统", "E. 重启中间件"], ["A","B","C","E"], "OOM解决：增加堆内存、代码优化、分析GC日志、临时重启。升级OS无直接作用。");
addMulti(395, "在迁移项目中，'验收标准'一般包括？", ["A. 功能100%可用", "B. 性能达标（TPS、响应时间）", "C. 数据一致无丢失", "D. 文档完整可交付", "E. 项目经理满意"], ["A","B","C","D"], "验收基于客观标准：功能全量通过、性能指标达标、数据一致性、文档完整。主观满意度不可量化。");
addMulti(396, "以下哪些命令可用于Linux下查看磁盘空间？", ["A. df -h", "B. du -sh /path", "C. fdisk -l", "D. lsblk", "E. top"], ["A","B","C","D"], "df查看分区容量，du查看目录大小，fdisk/lsblk查看磁盘分区信息。top查看CPU/内存。");
addMulti(397, "在国产数据库中，支持的索引类型通常包括？", ["A. B-Tree", "B. Hash", "C. 位图索引", "D. 全文索引", "E. 函数索引"], ["A","B","C","D","E"], "主流国产数据库（达梦/金仓/HighGo）支持多种索引：B-Tree默认、Hash、位图、全文、函数索引。");
addMulti(398, "关于'信创迁移'，下列说法错误的是？", ["A. 只需更换操作系统即可", "B. 必须更换所有应用软件", "C. 可在非信创环境做预迁移测试", "D. 不需要考虑安全加固", "E. 不需要用户培训"], ["A","B","D","E"], "错误说法：仅换OS不够(DB/中间件也要换)；不必全换应用；安全加固必须；用户培训必要。预迁移测试是可行的。");
addMulti(399, "信创适配迁移中必须替换的组件包括？", ["A. 操作系统", "B. 数据库", "C. 中间件", "D. 鼠标键盘", "E. 办公软件"], ["A","B","C","E"], "信创全栈替换：OS、DB、中间件、办公软件（WPS等）。外设如键鼠一般不强制替换。");
addMulti(400, "麒麟V10安全加固建议？", ["A. 启用SELinux", "B. 关闭非必要端口", "C. 最小化安装", "D. 禁用所有日志", "E. 定期更新补丁"], ["A","B","C","E"], "安全加固：强制访问控制、最小开放端口、最小化软件包、及时打补丁。日志至关重要不可禁用。");
addMulti(661, "以下属于龙芯处理器的技术特点的是？", ["A. 自主LoongArch指令集", "B. 兼容部分MIPS指令", "C. 支持x86硬件虚拟化", "D. 仅支持嵌入式场景"], ["A","B"], "龙芯LoongArch指令集完全自主，同时提供MIPS兼容模式。支持虚拟化但不直接兼容x86，且覆盖桌面/服务器/嵌入式多场景。");
addMulti(662, "飞腾处理器在信创生态中的优势包括？", ["A. 基于ARMv8架构，生态完善", "B. 桌面与服务器场景均有适配", "C. 功耗控制优秀", "D. 完全不依赖国外技术"], ["A","B","C"], "飞腾基于ARMv8永久授权，生态成熟；产品覆盖桌面(D2000)和服务器(S2500)；功耗控制优秀。但ARM架构仍需国外授权。");
addMulti(663, "以下属于麒麟操作系统的版本类型的是？", ["A. 桌面版", "B. 服务器版", "C. 嵌入式版", "D. 手机版"], ["A","B","C"], "麒麟操作系统有桌面版、服务器版、嵌入式版，覆盖多种场景。手机版不在其产品线中。");
addMulti(664, "统信UOS操作系统的特点包括？", ["A. 基于Debian开发", "B. 支持图形界面与命令行操作", "C. 适配龙芯、飞腾等国产CPU", "D. 仅支持办公场景"], ["A","B","C"], "统信UOS基于Debian，提供图形和命令行双模式，适配多种国产CPU，覆盖办公、服务器等全场景。");
addMulti(665, "在麒麟系统中，可用于查看系统信息的命令有？", ["A. cat /etc/os-release", "B. uname -a", "C. lscpu", "D. df -h"], ["A","B","C"], "cat /etc/os-release查看发行版信息，uname -a查看内核版本，lscpu查看CPU信息。df -h查看磁盘空间，非系统信息。");
addMulti(666, "统信UOS中，管理软件包的方式包括？", ["A. 使用apt命令行", "B. 使用图形化软件商店", "C. 使用dpkg手动安装deb包", "D. 使用yum命令"], ["A","B","C"], "统信UOS基于Debian，支持apt命令行、图形软件商店、dpkg手动安装。yum用于RPM发行版，不适用。");
addMulti(667, "麒麟系统中，与文件权限相关的命令有？", ["A. chmod", "B. chown", "C. chgrp", "D. ls -l"], ["A","B","C","D"], "chmod修改权限，chown改属主，chgrp改组，ls -l查看权限，全部与文件权限管理相关。");
addMulti(668, "海量数据库支持的SQL特性包括？", ["A. 事务处理（ACID）", "B. 存储过程与触发器", "C. 视图与索引", "D. 仅支持基础增删改查"], ["A","B","C"], "海量数据库基于PostgreSQL，完整支持ACID事务、存储过程、触发器、视图、索引等高级特性。");
addMulti(669, "在海量数据库中，管理用户权限的操作包括？", ["A. CREATE USER", "B. GRANT", "C. REVOKE", "D. DROP USER"], ["A","B","C","D"], "CREATE USER创建用户，GRANT授予权限，REVOKE回收权限，DROP USER删除用户，四者为完整权限管理操作。");
addMulti(670, "海量数据库的备份与恢复方式包括？", ["A. 使用pg_dump命令行备份", "B. 使用图形化管理工具备份", "C. 物理备份（复制数据文件）", "D. 仅支持全量备份"], ["A","B","C"], "海量数据库支持pg_dump逻辑备份、图形工具备份、物理文件复制备份，支持全量和增量备份。");
addMulti(671, "中创中间件支持的部署方式包括？", ["A. 单机部署", "B. 集群部署", "C. 容器化部署（Docker）", "D. 虚拟化部署"], ["A","B","C","D"], "中创InforSuite AS支持物理机单机、多节点集群、Docker容器、VMware虚机等多种部署方式。");
addMulti(672, "中创中间件的核心配置文件包括？", ["A. server.xml（服务配置）", "B. context.xml（数据源配置）", "C. web.xml（应用配置）", "D. setenv.sh（JVM参数配置）"], ["A","B","C","D"], "server.xml配置服务端口、虚拟主机；context.xml配置数据源；web.xml配置Servlet；setenv.sh配置JVM参数。");
addMulti(673, "中创中间件中配置数据源时，需要设置的参数有？", ["A. JDBC URL", "B. 驱动类名", "C. 用户名与密码", "D. 最大/最小连接数"], ["A","B","C","D"], "数据源配置必需：JDBC URL、驱动类名、用户名密码，可选：最大/最小连接数、超时时间等。");
addMulti(674, "中创中间件中查看应用日志的方式包括？", ["A. 查看/logs目录下的日志文件", "B. 通过管理控制台查看日志", "C. 使用tail -f命令实时查看", "D. 直接修改日志文件"], ["A","B","C"], "查看日志应使用只读方式：查看文件、控制台或tail -f。直接修改日志文件会破坏原始记录，不正确。");
addMulti(675, "应用系统迁移的主要阶段包括？", ["A. 评估调研阶段", "B. 环境准备阶段", "C. 适配迁移阶段", "D. 测试验证阶段", "E. 上线运维阶段"], ["A","B","C","D","E"], "完整迁移流程五个阶段：评估→准备→适配→测试→上线运维，缺一不可。");
addMulti(676, "应用迁移前的评估内容包括？", ["A. 应用架构与依赖分析", "B. 数据库兼容性评估", "C. 中间件适配情况", "D. 性能基准测试", "E. 用户界面设计评估"], ["A","B","C","D"], "技术评估聚焦：架构、依赖、数据库、中间件、性能基线。UI设计评估不属于迁移技术评估。");
addMulti(677, "应用迁移中常见的适配工作包括？", ["A. 数据库连接配置修改", "B. 中间件参数调整", "C. 依赖库（JAR/.so）替换", "D. 字符集统一", "E. 重写业务逻辑代码"], ["A","B","C","D"], "配置修改、参数调整、依赖替换、字符集统一是核心适配工作。重写业务逻辑违反最小改动原则。");
addMulti(678, "应用迁移中，数据迁移的方式包括？", ["A. 逻辑备份（SQL脚本导入导出）", "B. 物理备份（复制数据文件）", "C. 增量迁移", "D. 仅迁移核心业务数据"], ["A","B","C"], "数据迁移支持逻辑备份、物理备份、增量迁移。仅迁移核心数据可能导致数据丢失，不安全。");
addMulti(679, "兼容性验证的主要内容包括？", ["A. 功能兼容性验证", "B. 界面兼容性验证", "C. 数据一致性验证", "D. 性能兼容性验证", "E. 硬件兼容性验证"], ["A","B","C","D"], "兼容性验证涵盖功能、界面、数据一致性、性能四个维度。硬件兼容性在评估阶段已确认。");
addMulti(680, "性能调优的主要方向包括？", ["A. JVM参数调优", "B. 数据库SQL优化", "C. 连接池参数调优", "D. 缓存策略优化", "E. 服务器硬件升级"], ["A","B","C","D"], "性能调优以软件层面为主：JVM、SQL、连接池、缓存。硬件升级属资源扩容，非调优手段。");
addMulti(681, "故障排查中，查看网络连接状态的命令有？", ["A. netstat -tlnp", "B. ss -tlnp", "C. lsof -i :端口号", "D. ping", "E. traceroute"], ["A","B","C","D","E"], "netstat/ss/lsof查看端口监听，ping测试连通性，traceroute追踪路由，均为网络排查命令。");
addMulti(682, "应用迁移后常见的故障类型包括？", ["A. 应用启动失败", "B. 数据库连接失败", "C. 页面访问404/500错误", "D. 数据乱码", "E. 服务器断电"], ["A","B","C","D"], "应用层常见故障：启动失败、数据库连接失败、HTTP错误、乱码。服务器断电属硬件故障，非迁移特有。");
addMulti(683, "信创应用迁移的规范要求包括？", ["A. 制定详细迁移方案", "B. 保留回退机制", "C. 分阶段验证，逐步上线", "D. 完整记录迁移过程", "E. 跳过测试直接上线"], ["A","B","C","D"], "规范要求：方案、回退、分阶段、记录。跳过测试是严重违规行为，不可取。");
addMulti(684, "以下属于国产信创生态核心组件的是？", ["A. 龙芯/飞腾CPU", "B. 麒麟/统信操作系统", "C. 海量/达梦数据库", "D. 中创/东方通中间件", "E. Oracle数据库"], ["A","B","C","D"], "信创四大件：CPU、操作系统、数据库、中间件，均为国产品牌。Oracle为国外产品。");
addMulti(685, "麒麟操作系统中，服务管理相关的命令有？", ["A. systemctl start/stop/restart", "B. service start/stop/restart", "C. chkconfig", "D. systemctl enable/disable"], ["A","B","C","D"], "麒麟支持systemctl、service、chkconfig多种服务管理命令，兼容新旧两种init系统。");
addMulti(686, "统信UOS中，与网络配置相关的操作包括？", ["A. 修改/etc/network/interfaces文件", "B. 使用nmcli命令配置IP", "C. 通过图形化网络设置配置", "D. 直接修改hosts文件"], ["A","B","C"], "网络配置可通过配置文件、nmcli命令行、图形界面三种方式。hosts文件用于域名解析，非IP配置。");
addMulti(687, "海量数据库中，常用的psql客户端命令包括？", ["A. \\l（查看所有数据库）", "B. \\d（查看表结构）", "C. \\du（查看用户）", "D. \\q（退出客户端）"], ["A","B","C","D"], "psql元命令：\\l列出数据库，\\d查看表结构，\\du查看用户，\\q退出，均为常用命令。");
addMulti(688, "中创中间件中，部署应用的方式包括？", ["A. 将WAR包放入webapps目录自动部署", "B. 通过管理控制台上传部署", "C. 使用命令行脚本部署", "D. 直接复制应用目录到服务器"], ["A","B","C"], "支持自动部署、控制台上传、脚本部署。直接复制目录可能缺少必要配置，不推荐。");
addMulti(689, "应用迁移中，处理字符集乱码问题的措施包括？", ["A. 统一源数据库与目标数据库的字符集（如UTF-8）", "B. 修改应用配置文件中的编码设置", "C. 调整操作系统的默认编码", "D. 更换应用字体文件"], ["A","B","C"], "乱码解决：统一数据库字符集、应用编码、OS编码三层。字体文件不解决字符集乱码问题。");
addMulti(690, "性能调优中，数据库层面的优化措施包括？", ["A. 优化SQL语句，避免全表扫描", "B. 创建合适的索引", "C. 调整数据库连接池参数", "D. 定期分析表与重建索引"], ["A","B","C","D"], "数据库优化：SQL优化、索引、连接池、统计信息更新和索引重建，均为有效手段。");
addMulti(691, "故障排查中，查看系统资源使用情况的命令有？", ["A. top", "B. free -h", "C. df -h", "D. iostat", "E. vmstat"], ["A","B","C","D","E"], "top看CPU/进程，free看内存，df看磁盘，iostat看I/O，vmstat看虚拟内存和系统整体状态。");
addMulti(692, "应用迁移后，性能验证的常用工具包括？", ["A. JMeter（压力测试）", "B. Postman（接口测试）", "C. 系统自带监控工具", "D. 手动用户操作测试"], ["A","B","C"], "JMeter压测、Postman接口测试、系统监控工具均可用于性能验证。手动测试量小且不精准。");
addMulti(693, "中创中间件中，安全加固的措施包括？", ["A. 修改管理控制台默认密码", "B. 关闭不必要的端口", "C. 配置SSL加密", "D. 限制控制台访问IP"], ["A","B","C","D"], "安全加固：改默认密码、最小化端口、SSL加密、IP白名单，四者均为标准措施。");
addMulti(694, "海量数据库的安全配置措施包括？", ["A. 修改默认超级管理员密码", "B. 限制数据库远程访问IP", "C. 启用日志审计", "D. 定期备份数据"], ["A","B","C","D"], "数据库安全：改默认密码、IP白名单、审计日志、定期备份，四者均为必备措施。");
addMulti(695, "应用迁移中，回退方案的制定原则包括？", ["A. 明确回退触发条件", "B. 制定详细回退步骤", "C. 提前备份源环境数据与配置", "D. 无需测试，直接回退"], ["A","B","C"], "回退方案三原则：触发条件、操作步骤、提前备份。回退前需测试验证其可行性。");
addMulti(696, "以下属于应用迁移文档必备内容的是？", ["A. 迁移环境清单（软硬件版本）", "B. 详细迁移步骤", "C. 故障排查手册", "D. 回退方案", "E. 验收标准"], ["A","B","C","D","E"], "迁移文档应完整：环境清单、操作步骤、故障手册、回退方案、验收标准，五者缺一不可。");
addMulti(697, "麒麟系统中，与磁盘管理相关的命令有？", ["A. fdisk", "B. mkfs", "C. mount", "D. umount", "E. lsblk"], ["A","B","C","D","E"], "fdisk分区，mkfs格式化，mount/umount挂载卸载，lsblk查看块设备，均为磁盘管理命令。");
addMulti(698, "统信UOS中，用户管理相关的命令有？", ["A. useradd", "B. userdel", "C. passwd", "D. usermod", "E. groupadd"], ["A","B","C","D","E"], "useradd添加用户，userdel删除，passwd改密码，usermod修改属性，groupadd添加组，均为用户管理命令。");
addMulti(699, "海量数据库中，支持的索引类型包括？", ["A. B-Tree索引", "B. Hash索引", "C. 位图索引", "D. 全文索引", "E. 函数索引"], ["A","B","C","D","E"], "PostgreSQL/海量数据库支持B-Tree、Hash、位图(GIN)、全文、函数索引等多种索引类型。");
addMulti(700, "中创中间件中，日志管理相关的配置包括？", ["A. 日志级别设置（INFO/WARN/ERROR）", "B. 日志文件路径配置", "C. 日志轮转策略配置", "D. 日志文件加密配置"], ["A","B","C"], "日志管理：级别、路径、轮转。加密日志文件非常规配置，一般用于特殊安全场景。");
addMulti(701, "应用迁移中，依赖问题的常见类型包括？", ["A. JAR包版本冲突", "B. 动态库（.so）缺失或不兼容", "C. 系统依赖包未安装", "D. 第三方服务依赖不可用"], ["A","B","C","D"], "依赖问题四类：JAR冲突、动态库、系统包、第三方服务，需逐一排查解决。");
addMulti(702, "兼容性验证中，界面验证的重点是？", ["A. 页面布局与原环境一致", "B. 按钮、菜单等交互元素可用", "C. 字体显示正常", "D. 图片加载正常", "E. 仅测试首页界面"], ["A","B","C","D"], "界面验证应覆盖全站：布局、交互、字体、图片，不能只测首页。");
addMulti(703, "性能调优中，JVM参数调优的常用参数包括？", ["A. -Xms（初始堆）", "B. -Xmx（最大堆）", "C. -XX:+UseG1GC（垃圾回收器）", "D. -XX:NewRatio（新生代比例）"], ["A","B","C","D"], "JVM调优常用参数：初始堆、最大堆、GC选择、新生代比例，四者均为关键参数。");
addMulti(704, "故障排查中，查看应用日志的常见关键词包括？", ["A. Exception", "B. Error", "C. Failed", "D. Connection refused", "E. Success"], ["A","B","C","D"], "排查日志应关注异常、错误、失败、连接拒绝等关键词，Success表示正常无需关注。");
addMulti(705, "以下属于信创应用迁移的优势的是？", ["A. 实现软硬件自主可控", "B. 提升系统安全性", "C. 适配国产生态，降低依赖风险", "D. 迁移过程无任何成本"], ["A","B","C"], "信创优势：自主可控、安全提升、降低依赖风险。迁移需要投入人力和时间成本。");
addMulti(706, "麒麟操作系统的安全特性包括？", ["A. 内置安全审计机制", "B. 支持国密算法", "C. 提供防火墙工具", "D. 仅支持命令行操作，降低攻击面"], ["A","B","C"], "麒麟安全特性：审计、国密、防火墙。支持图形界面，并非仅命令行。");
addMulti(707, "统信UOS的图形化管理工具包括？", ["A. 软件商店", "B. 系统设置中心", "C. 网络管理器", "D. 日志查看器"], ["A","B","C","D"], "统信UOS提供软件商店、设置中心、网络管理器、日志查看器等图形化管理工具。");
addMulti(708, "海量数据库中，事务管理相关的操作包括？", ["A. BEGIN（开启事务）", "B. COMMIT（提交事务）", "C. ROLLBACK（回滚事务）", "D. SAVEPOINT（设置保存点）"], ["A","B","C","D"], "事务操作：BEGIN开始，COMMIT提交，ROLLBACK回滚，SAVEPOINT设置保存点支持部分回滚。");
addMulti(709, "中创中间件中，集群部署的优势包括？", ["A. 提升系统高可用性", "B. 支持负载均衡", "C. 提升并发处理能力", "D. 简化配置管理"], ["A","B","C"], "集群优势：高可用、负载均衡、高并发。集群配置比单机更复杂，不会简化配置。");
addMulti(710, "应用迁移中，数据一致性校验的方式包括？", ["A. 对比源库与目标库的记录数", "B. 抽样对比关键业务数据", "C. 校验数据文件的MD5值", "D. 仅检查数据库连接是否成功"], ["A","B","C"], "数据校验：总记录数、抽样对比、MD5校验。仅检查连接不能验证数据一致性。");
addMulti(711, "以下属于应用迁移中'配置适配'内容的是？", ["A. 修改数据库连接URL、用户名、密码", "B. 调整中间件的端口号", "C. 修改应用的日志路径", "D. 调整应用的缓存配置"], ["A","B","C","D"], "配置适配涵盖：数据库连接、中间件端口、日志路径、缓存策略等所有配置文件调整。");
addMulti(712, "性能调优中，系统层面的优化措施包括？", ["A. 调整操作系统内核参数（如文件句柄数）", "B. 优化磁盘I/O调度策略", "C. 关闭不必要的系统服务", "D. 增加服务器CPU/内存配置"], ["A","B","C"], "系统调优：内核参数、I/O调度、关闭无用服务。增加硬件属扩容，非调优。");
addMulti(713, "故障排查中，处理'权限不足'问题的措施包括？", ["A. 使用chmod修改文件/目录权限", "B. 使用chown修改文件所属用户", "C. 使用sudo提升权限执行命令", "D. 直接给所有文件设置777权限"], ["A","B","C"], "权限问题解决：chmod改权限，chown改属主，sudo提权。设置777存在安全风险，不推荐。");
addMulti(714, "中创中间件启动失败的常见原因包括？", ["A. 端口被占用", "B. JVM参数配置错误（如内存不足）", "C. 配置文件语法错误", "D. 依赖的JAR包缺失", "E. 操作系统版本过低"], ["A","B","C","D","E"], "启动失败多因素：端口、JVM、配置、依赖、OS版本，需逐项排查。");
addMulti(715, "海量数据库启动失败的常见原因包括？", ["A. 端口被占用", "B. 数据文件损坏", "C. 配置文件错误", "D. 权限不足（无法读写数据目录）", "E. 系统内存不足"], ["A","B","C","D","E"], "数据库启动失败原因：端口、数据文件、配置、权限、内存，五者均为常见因素。");
addMulti(716, "应用迁移中，'容器化部署'的优势包括？", ["A. 环境一致性高，减少依赖问题", "B. 部署速度快，可重复", "C. 便于扩展与管理", "D. 完全不依赖底层操作系统"], ["A","B","C"], "容器化优势：环境一致性、快速部署、易扩展。容器仍依赖宿主机操作系统内核。");
addMulti(717, "以下属于应用迁移中'测试验证'阶段的工作是？", ["A. 功能测试", "B. 性能测试", "C. 安全测试", "D. 兼容性测试", "E. 用户验收测试"], ["A","B","C","D","E"], "测试验证阶段：功能、性能、安全、兼容性、用户验收，五类测试全部需要。");
addMulti(718, "信创应用迁移中，常见的挑战包括？", ["A. 第三方依赖兼容性问题", "B. 数据库语法差异", "C. 动态库适配困难", "D. 性能调优难度大", "E. 完全没有挑战"], ["A","B","C","D"], "信创迁移挑战：依赖、数据库语法、动态库、性能调优。并非没有挑战。");
addMulti(719, "麒麟系统中，查看进程状态的命令有？", ["A. ps aux", "B. top", "C. htop", "D. pstree", "E. kill"], ["A","B","C","D"], "ps/top/htop查看进程状态，pstree查看进程树，kill用于终止进程而非查看。");
addMulti(720, "统信UOS中，与文件传输相关的命令有？", ["A. scp", "B. sftp", "C. ftp", "D. rsync", "E. wget"], ["A","B","C","D","E"], "文件传输命令：scp/sftp（SSH加密）、ftp（明文）、rsync（增量同步）、wget（下载）。");
addMulti(721, "海量数据库中，视图的作用包括？", ["A. 简化复杂查询", "B. 提高数据安全性（隐藏敏感字段）", "C. 便于数据复用", "D. 提升查询性能（物化视图）"], ["A","B","C","D"], "视图作用：简化查询、安全隔离、数据复用。物化视图可提升性能，普通视图不提升。");
addMulti(722, "中创中间件中，虚拟主机配置的作用包括？", ["A. 同一端口部署多个应用", "B. 基于域名区分不同应用", "C. 简化应用访问路径", "D. 提升系统安全性"], ["A","B","C"], "虚拟主机：同端口多应用、域名区分、简化路径。安全性与虚拟主机无直接关系。");
addMulti(723, "应用迁移中，'增量迁移'的优势包括？", ["A. 减少业务停机时间", "B. 降低迁移风险", "C. 便于分阶段验证", "D. 一次性完成所有数据迁移"], ["A","B","C"], "增量迁移：短停机、低风险、分阶段验证。一次性迁移是全量方式，非增量特点。");
addMulti(724, "兼容性验证中，安全验证的重点是？", ["A. 验证用户权限控制是否正常", "B. 检查敏感数据是否加密存储", "C. 验证登录认证功能", "D. 检查系统是否存在漏洞"], ["A","B","C","D"], "安全验证：权限控制、数据加密、认证功能、漏洞扫描，四者均为重点。");
addMulti(725, "性能调优中，缓存策略优化的方式包括？", ["A. 引入Redis缓存热点数据", "B. 优化应用本地缓存配置", "C. 调整缓存过期时间", "D. 增加缓存数据量"], ["A","B","C"], "缓存优化：引入分布式缓存、优化本地缓存、调整过期时间。盲目增加数据量无益。");
addMulti(726, "故障排查中，定位网络问题的步骤包括？", ["A. 检查网络连接是否正常（ping网关/目标IP）", "B. 检查端口是否开放（telnet/nc）", "C. 检查防火墙规则是否放行", "D. 检查DNS解析是否正常"], ["A","B","C","D"], "网络排查四步：连通性(ping)、端口(telnet)、防火墙、DNS解析。");
addMulti(727, "以下属于信创应用迁移中'上线阶段'的工作是？", ["A. 切换业务流量到新环境", "B. 实时监控系统运行状态", "C. 准备回退方案，随时应对故障", "D. 上线后进行最终验证"], ["A","B","C","D"], "上线阶段工作：流量切换、实时监控、回退待命、最终验证，四项并行执行。");
addMulti(728, "中创中间件中，管理控制台的功能包括？", ["A. 部署/卸载应用", "B. 启停/重启应用", "C. 查看应用运行状态", "D. 配置数据源与连接池", "E. 管理服务器配置"], ["A","B","C","D","E"], "管理控制台功能：应用部署启停、状态监控、数据源配置、服务器配置，五者全覆盖。");
addMulti(729, "海量数据库中，分区表的作用包括？", ["A. 提升大表查询性能", "B. 便于数据管理与维护", "C. 降低单表数据量，减少锁竞争", "D. 增加数据安全性"], ["A","B","C"], "分区表作用：提升查询性能、便于维护（如删除旧分区）、减少锁竞争。安全性不受分区影响。");
addMulti(730, "应用迁移完成后，运维阶段的工作包括？", ["A. 定期监控系统性能", "B. 备份数据库与配置", "C. 及时修复发现的问题", "D. 持续优化系统性能", "E. 无需运维，系统自动稳定运行"], ["A","B","C","D"], "运维工作：性能监控、定期备份、问题修复、持续优化。系统不会自动稳定，需要持续运维。");

addMulti(876, "以下属于国产CPU架构的有？", ["A. LoongArch", "B. ARM", "C. x86", "D. Alpha"], ["A","D"], "LoongArch龙芯自主架构，Alpha申威衍生架构。ARM/x86为国外架构，虽国产CPU采用但架构非国产。");
addMulti(877, "龙芯处理器的特点包括？", ["A. 自主指令集", "B. 二进制翻译", "C. 完全兼容Windows", "D. 低功耗"], ["A","B","D"], "龙芯LoongArch自主指令集，通过二进制翻译运行MIPS/x86应用，功耗控制良好。不能完全兼容Windows。");
addMulti(878, "飞腾处理器的产品线包括？", ["A. 腾云（服务器）", "B. 腾锐（桌面）", "C. 腾珑（嵌入式）", "D. 酷睿（桌面）"], ["A","B","C"], "飞腾三大系列：腾云服务器、腾锐桌面、腾珑嵌入式。酷睿是Intel产品。");
addMulti(879, "鲲鹏处理器的优势包括？", ["A. 多核高并发", "B. 低功耗", "C. 原生ARM生态", "D. 兼容x86指令集"], ["A","B","C"], "鲲鹏最多64核，ARM架构功耗低，原生支持Linux/Android生态。不兼容x86指令集。");
addMulti(880, "在CPU适配迁移中，需要关注的硬件参数有？", ["A. 主频", "B. 核心数", "C. 缓存大小", "D. 指令集架构"], ["A","B","C","D"], "CPU选型需综合考虑主频、核心数、缓存、指令集架构对性能的影响。");
addMulti(881, "下列关于RISC和CISC的描述，正确的有？", ["A. ARM属于RISC", "B. x86属于CISC", "C. RISC指令长度通常固定", "D. CISC指令执行周期通常较长"], ["A","B","C","D"], "RISC固定指令长度、单周期执行；CISC变长指令、复杂功能、执行周期较长。");
addMulti(882, "龙芯生态中，用于二进制翻译的软件有？", ["A. QEMU", "B. ExaGear", "C. WINE", "D. Docker"], ["A","B"], "QEMU多架构模拟，ExaGear是龙芯二进制翻译工具。WINE运行Windows应用，Docker容器化。");
addMulti(883, "飞腾CPU支持的操作系统包括？", ["A. 麒麟", "B. 统信", "C. Windows", "D. Linux"], ["A","B","D"], "飞腾支持麒麟、统信、Debian、CentOS等Linux发行版，Windows ARM版支持有限且非主流。");
addMulti(884, "影响CPU性能的因素包括？", ["A. 流水线深度", "B. 分支预测准确率", "C. 缓存命中率", "D. 硬盘转速"], ["A","B","C"], "CPU性能由流水线、分支预测、缓存命中率等微架构指标决定。硬盘转速影响IO非CPU。");
addMulti(885, "国产化替代中，CPU选型需要考虑的因素有？", ["A. 生态兼容性", "B. 性能需求", "C. 供货稳定性", "D. 价格成本"], ["A","B","C","D"], "CPU选型四要素：生态兼容、性能满足、供货稳定、成本控制。");
addMulti(886, "国产操作系统通常支持的CPU架构包括？", ["A. x86_64", "B. ARM64", "C. MIPS64", "D. LoongArch"], ["A","B","C","D"], "国产OS适配主流CPU：x86、ARM（飞腾/鲲鹏）、MIPS（龙芯早期）、LoongArch（龙芯）。");
addMulti(887, "麒麟操作系统的版本系列包括？", ["A. 桌面版", "B. 服务器版", "C. 嵌入式版", "D. 专用版"], ["A","B","C","D"], "麒麟覆盖桌面、服务器、嵌入式及高安全专用版等全系列产品。");
addMulti(888, "Linux系统中，常见的Shell有？", ["A. bash", "B. sh", "C. zsh", "D. cmd"], ["A","B","C"], "bash最常用，sh是早期标准，zsh功能丰富。cmd是Windows命令提示符。");
addMulti(889, "统信UOS桌面版预装的办公软件通常包括？", ["A. WPS Office", "B. 微信", "C. QQ", "D. Adobe Photoshop"], ["A","B","C"], "统信UOS预装WPS、微信、QQ等国产常用软件。Photoshop无原生Linux版。");
addMulti(890, "在Linux中，查看日志文件的常用命令有？", ["A. tail -f", "B. cat", "C. less", "D. more"], ["A","B","C","D"], "tail -f实时追踪，cat全部输出，less/more分页查看，四者均为日志查看命令。");
addMulti(891, "麒麟系统中，SELinux的状态可以是？", ["A. Enforcing", "B. Permissive", "C. Disabled", "D. Active"], ["A","B","C"], "SELinux三状态：Enforcing强制策略，Permissive只告警不拦截，Disabled关闭。");
addMulti(892, "统信UOS应用商店支持的应用格式有？", ["A. deb", "B. rpm", "C. AppImage", "D. flatpak"], ["A","C","D"], "统信基于Debian原生支持deb，AppImage和flatpak为通用格式。rpm用于RPM系系统。");
addMulti(893, "Linux系统启动流程包括？", ["A. BIOS/UEFI", "B. Bootloader (Grub)", "C. Kernel", "D. Init/Systemd"], ["A","B","C","D"], "启动顺序：BIOS→Bootloader→Kernel→Init/systemd→用户空间。");
addMulti(894, "以下属于Linux运行级别的有？", ["A. 0 (关机)", "B. 3 (多用户文本)", "C. 5 (多用户图形)", "D. 6 (重启)"], ["A","B","C","D"], "运行级别：0关机、1单用户、3多用户文本、5图形界面、6重启。");
addMulti(895, "操作系统迁移适配中，需要重新编译的内容有？", ["A. 内核模块", "B. 依赖特定库的二进制文件", "C. 纯Java应用", "D. Shell脚本"], ["A","B"], "内核模块和C/C++二进制需重新编译；Java字节码跨平台免编译；Shell脚本解释执行免编译。");
addMulti(896, "国产数据库迁移工具通常具备的功能有？", ["A. 结构迁移", "B. 全量数据迁移", "C. 增量数据同步", "D. 数据校验"], ["A","B","C","D"], "主流国产DTS工具支持：结构、全量、增量迁移和数据一致性校验四项核心功能。");
addMulti(897, "海量数据库（Vastbase）的特点包括？", ["A. 高可用性", "B. 高安全性", "C. 兼容Oracle语法", "D. 多版本并发控制"], ["A","B","C","D"], "Vastbase具备主备集群高可用、国密算法安全、Oracle兼容、MVCC并发控制等特性。");
addMulti(898, "常见的数据库备份策略包括？", ["A. 完全备份", "B. 增量备份", "C. 差异备份", "D. 日志备份"], ["A","B","C","D"], "备份策略：全量、增量（只变动的）、差异（上次全量后）、日志（WAL归档）。");
addMulti(899, "数据库性能优化可以从哪些方面入手？", ["A. SQL语句优化", "B. 索引优化", "C. 参数配置优化", "D. 硬件升级"], ["A","B","C","D"], "性能优化金字塔：SQL→索引→参数→硬件，自顶向下逐层优化。");
addMulti(900, "下列属于国产数据库品牌的有？", ["A. 达梦", "B. 人大金仓", "C. 海量", "D. 南大通用"], ["A","B","C","D"], "四大国产数据库厂商：达梦、金仓、海量数据、南大通用（GBase）。");
addMulti(901, "PostgreSQL生态中的工具包括？", ["A. pgAdmin", "B. pg_stat_statements", "C. pg_basebackup", "D. RMAN"], ["A","B","C"], "pgAdmin图形管理，pg_stat_statements性能分析，pg_basebackup物理备份。RMAN是Oracle工具。");
addMulti(902, "数据库连接失败的可能原因有？", ["A. 网络不通", "B. 端口被防火墙拦截", "C. 监听服务未启动", "D. 用户名密码错误"], ["A","B","C","D"], "连接失败四原因：网络、防火墙、服务状态、认证信息，需逐项排查。");
addMulti(903, "在海量数据库中，支持的分区表类型有？", ["A. 范围分区", "B. 列表分区", "C. 哈希分区", "D. 复合分区"], ["A","B","C","D"], "PostgreSQL/海量支持范围、列表、哈希分区及复合分区。");
addMulti(904, "迁移评估阶段需要收集的信息有？", ["A. 源库版本", "B. 对象数量", "C. 数据量大小", "D. 业务高峰期"], ["A","B","C","D"], "评估信息：数据库版本、对象数量、数据量、业务特征，用于制定迁移策略。");
addMulti(905, "数据库事务的特性包括？", ["A. 原子性", "B. 一致性", "C. 隔离性", "D. 持久性"], ["A","B","C","D"], "ACID特性：原子性（全做全不做）、一致性、隔离性（并发）、持久性（宕机不丢）。");
addMulti(906, "国产中间件厂商包括？", ["A. 中创", "B. 东方通", "C. 宝兰德", "D. 普元"], ["A","B","C","D"], "国产中间件厂商：中创、东方通、宝兰德、普元、金蝶天燕等。");
addMulti(907, "中间件的主要功能包括？", ["A. 通信支持", "B. 事务管理", "C. 负载均衡", "D. 安全服务"], ["A","B","C","D"], "中间件提供通信、事务、负载均衡、认证授权等公共服务。");
addMulti(908, "在迁移WebLogic应用到国产中间件时，可能需要修改的文件有？", ["A. web.xml", "B. weblogic.xml", "C. 数据源配置文件", "D. 启动脚本"], ["A","B","C","D"], "WebLogic专有配置weblogic.xml需改写或删除，其他配置也需适配。");
addMulti(909, "消息中间件的应用场景有？", ["A. 日志收集", "B. 订单处理", "C. 实时聊天", "D. 静态网页服务"], ["A","B","C"], "消息中间件用于异步场景：日志、订单解耦、聊天消息。静态网页用HTTP服务器。");
addMulti(910, "中间件性能调优通常涉及？", ["A. 线程池大小", "B. JVM堆内存", "C. 连接池配置", "D. 网络带宽"], ["A","B","C","D"], "中间件调优四维度：线程池、JVM内存、数据库连接池、网络带宽。");
addMulti(911, "Java EE规范包含的技术有？", ["A. Servlet", "B. JSP", "C. EJB", "D. JMS"], ["A","B","C","D"], "Java EE核心技术：Servlet、JSP、EJB、JMS、JPA、JTA等。");
addMulti(912, "部署应用失败的可能原因有？", ["A. JDK版本不兼容", "B. 缺少依赖包", "C. 配置文件错误", "D. 端口冲突"], ["A","B","C","D"], "部署失败多因素：JDK版本、依赖缺失、配置错误、端口冲突。");
addMulti(913, "中间件的高可用性（HA）实现方式包括？", ["A. 主备切换", "B. 负载均衡集群", "C. 异地容灾", "D. 单机运行"], ["A","B","C"], "高可用方案：主备、集群负载均衡、异地容灾。单机有单点故障风险。");
addMulti(914, "国产中间件适配迁移的步骤包括？", ["A. 环境准备", "B. 应用部署", "C. 数据源配置", "D. 功能验证"], ["A","B","C","D"], "迁移步骤：环境准备→应用部署→数据源配置→功能验证→性能测试。");
addMulti(915, "常见的负载均衡算法有？", ["A. 轮询", "B. 随机", "C. 加权", "D. 源地址哈希"], ["A","B","C","D"], "负载均衡算法：轮询、随机、加权轮询、IP哈希、最少连接等。");
addMulti(916, "信创迁移的基本原则包括？", ["A. 应替尽替", "B. 真替真用", "C. 安全稳定", "D. 成本最低"], ["A","B","C"], "原则：能替尽替、真替真用、安全稳定。成本最低不是优先原则，质量更重要。");
addMulti(917, "迁移前的调研内容通常包括？", ["A. 软硬件清单", "B. 网络拓扑", "C. 业务逻辑", "D. 数据流向"], ["A","B","C","D"], "调研四维度：资源清单、网络架构、业务流程、数据流转。");
addMulti(918, "迁移实施阶段的工作包括？", ["A. 环境搭建", "B. 软件编译/部署", "C. 数据迁移", "D. 功能调试"], ["A","B","C","D"], "实施阶段：搭建环境、编译部署、迁移数据、调试功能。");
addMulti(919, "迁移测试的类型包括？", ["A. 功能测试", "B. 性能测试", "C. 安全测试", "D. 兼容性测试"], ["A","B","C","D"], "测试体系：功能、性能、安全、兼容性四类测试缺一不可。");
addMulti(920, "割接方案包含的内容有？", ["A. 割接步骤", "B. 时间计划", "C. 人员分工", "D. 回退机制"], ["A","B","C","D"], "割接方案四要素：操作步骤、时间窗口、人员职责、回退预案。");
addMulti(921, "影响迁移成本的因素有？", ["A. 代码耦合度", "B. 依赖组件数量", "C. 数据量大小", "D. 业务复杂度"], ["A","B","C","D"], "成本影响因素：代码架构、依赖复杂度、数据量、业务逻辑复杂度。");
addMulti(922, "在迁移过程中，遇到开源组件不支持国产CPU时，解决方案有？", ["A. 寻找替代组件", "B. 自行移植编译", "C. 联系厂商支持", "D. 放弃迁移"], ["A","B","C"], "解决方案：找替代、自行移植、联系厂商。放弃迁移不可取。");
addMulti(923, "迁移验收的标准通常包括？", ["A. 功能正常", "B. 性能达标", "C. 文档齐全", "D. 无重大故障"], ["A","B","C","D"], "验收标准四维度：功能完整性、性能指标、文档交付、故障等级。");
addMulti(924, "应用打包的常见格式有？", ["A. RPM", "B. DEB", "C. TAR.GZ", "D. ISO"], ["A","B","C","D"], "打包格式：RPM（RPM系）、DEB（Debian系）、tar.gz源码包、ISO光盘镜像。");
addMulti(925, "迁移项目团队通常包括？", ["A. 项目经理", "B. 架构师", "C. 开发/测试人员", "D. 运维人员"], ["A","B","C","D"], "团队角色：项目管理、架构设计、开发测试、运维保障，缺一不可。");
addMulti(926, "性能瓶颈通常出现在？", ["A. CPU", "B. 内存", "C. 磁盘IO", "D. 网络"], ["A","B","C","D"], "性能瓶颈四位置：CPU计算饱和、内存不足、磁盘IO慢、网络带宽限制。");
addMulti(927, "常见的故障排查思路有？", ["A. 自顶向下", "B. 自底向上", "C. 二分法", "D. 替换法"], ["A","B","C","D"], "排查方法论：自顶向下（应用→系统），自底向上（硬件→应用），二分法（系统分层定位），替换法。");
addMulti(928, "Linux下查看网络连接状态的命令有？", ["A. netstat -anp", "B. ss -ant", "C. lsof -i", "D. ifconfig"], ["A","B","C"], "netstat、ss、lsof -i查看网络连接，ifconfig查看网卡配置。");
addMulti(929, "数据库调优的手段包括？", ["A. 建立索引", "B. 优化SQL", "C. 调整缓冲区大小", "D. 读写分离"], ["A","B","C","D"], "数据库调优四手段：索引、SQL优化、内存参数、架构分离。");
addMulti(930, "中间件调优通常关注？", ["A. 线程池配置", "B. JVM参数", "C. 连接池大小", "D. 静态资源缓存"], ["A","B","C","D"], "中间件调优：线程池、JVM堆、连接池、静态资源缓存四关键。");
addMulti(931, "兼容性测试发现的问题类型有？", ["A. 界面错位", "B. 功能不可用", "C. 性能下降", "D. 乱码"], ["A","B","C","D"], "兼容性问题四类：界面、功能、性能、编码。");
addMulti(932, "系统日志通常存放在？", ["A. /var/log", "B. /var/log/messages", "C. /var/log/syslog", "D. /etc/log"], ["A","B","C"], "系统日志目录/var/log，messages系统日志，syslog某些发行版。");

addMulti(1155, "飞腾处理器支持的电源管理状态通常有？", ["A. 运行状态", "B. 空闲状态", "C. 休眠状态", "D. 关机状态"], ["A","B","C","D"], "飞腾支持ACPI规范的多种电源状态：C0运行、C1空闲、S3休眠、S5关机。");
addMulti(1156, "影响国产CPU性能的关键微架构参数有？", ["A. 流水线深度", "B. 缓存大小", "C. 内存控制器设计", "D. 分支预测准确率"], ["A","B","C","D"], "微架构四要素：流水线、缓存层次、内存控制器、分支预测。");
addMulti(1157, "龙芯处理器在嵌入式领域的应用场景有？", ["A. 工业控制", "B. 路由器", "C. 智能家电", "D. 高性能计算"], ["A","B","C"], "龙芯1A/2K系列用于工控、路由器、智能家电。高性能计算用3C系列。");
addMulti(1158, "飞腾处理器在大数据场景下的优势包括？", ["A. 高并发处理能力", "B. 内存带宽高", "C. 支持大内存容量", "D. 价格低廉"], ["A","B","C"], "飞腾多核高并发、内存带宽高、支持大内存，适合大数据。价格非显著优势。");
addMulti(1159, "国产CPU与x86 CPU的差异主要体现在？", ["A. 指令集不同", "B. 生态系统不同", "C. 性能功耗比", "D. 软件兼容性"], ["A","B","D"], "指令集差异导致二进制不兼容，生态和软件兼容性是主要差异。性能功耗比各有优劣。");
addMulti(1160, "针对国产CPU的编译器优化需要关注什么？", ["A. 指令调度", "B. 循环优化", "C. 内存对齐", "D. 向量化支持"], ["A","B","C","D"], "编译器优化需关注指令调度、循环展开、内存对齐、SIMD向量化。");
addMulti(1161, "龙芯处理器支持的内存类型包括？", ["A. DDR3", "B. DDR4", "C. LPDDR4", "D. GDDR6"], ["A","B","C"], "龙芯3A5000支持DDR4，早期型号支持DDR3和LPDDR4。GDDR6用于显卡。");
addMulti(1162, "飞腾处理器的多芯片互联技术有哪些？", ["A. 片间一致性互联", "B. PCIe桥接", "C. 专用互联总线", "D. 以太网互联"], ["A","C"], "飞腾多路服务器使用片间一致性互联（CCI）和专用高速总线。");
addMulti(1163, "国产CPU生态建设中，操作系统需要适配哪些方面？", ["A. 中断处理", "B. 内存管理", "C. 上下文切换", "D. 设备驱动"], ["A","B","C","D"], "OS适配：中断控制器、MMU、上下文切换、外设驱动。");
addMulti(1164, "龙芯处理器的二进制翻译技术能支持哪些外来指令？", ["A. x86", "B. ARM", "C. RISC-V", "D. MIPS"], ["A","D"], "LATS主要支持x86和MIPS二进制翻译，ARM和RISC-V支持有限。");
addMulti(1165, "飞腾处理器的虚拟化扩展包含哪些功能？", ["A. 嵌套虚拟化", "B. I/O虚拟化", "C. 虚拟中断控制器", "D. 内存虚拟化"], ["B","C","D"], "ARM VHE支持IO虚拟化、虚拟中断控制器GIC、内存虚拟化。嵌套虚拟化支持有限。");

// 国产操作系统（16-30）
addMulti(1166, "麒麟操作系统提供的安全机制包括？", ["A. SELinux", "B. 安全审计", "C. 强制访问控制", "D. 数据加密"], ["A","B","C","D"], "麒麟安全框架：SELinux、audit审计、MAC强制访问控制、加密文件系统。");
addMulti(1167, "统信UOS的特色功能包括？", ["A. 应用商店", "B. 备份还原工具", "C. 多屏协同", "D. 云账户同步"], ["A","B","C","D"], "UOS特色：应用商店、备份还原、多屏协同、云账户同步。");
addMulti(1168, "在麒麟系统中，常用的系统监控命令有？", ["A. top", "B. htop", "C. glances", "D. perf"], ["A","B","C","D"], "top/htop进程监控，glances综合监控，perf性能分析。");
addMulti(1169, "统信UOS的软件包管理方式支持哪些格式？", ["A. deb", "B. flatpak", "C. snap", "D. appimage"], ["A","B","C","D"], "UOS原生deb，商店支持flatpak/snap/AppImage通用格式。");
addMulti(1170, "麒麟操作系统支持的文件系统类型有？", ["A. ext4", "B. xfs", "C. btrfs", "D. ntfs"], ["A","B","C","D"], "麒麟支持ext4/xfs/btrfs原生，ntfs需安装ntfs-3g。");
addMulti(1171, "统信UOS的网络配置方式包括哪些？", ["A. 图形界面", "B. nmcli", "C. 手动修改配置文件", "D. netplan"], ["A","B","C","D"], "UOS支持图形界面、nmcli命令行、/etc/network/interfaces、netplan多种方式。");
addMulti(1172, "在麒麟系统中，用户和组管理命令有？", ["A. useradd", "B. groupadd", "C. usermod", "D. passwd"], ["A","B","C","D"], "useradd/groupadd添加，usermod修改，passwd设置密码。");
addMulti(1173, "统信UOS的图形界面故障排查方法有？", ["A. 重启桌面环境", "B. 查看Xorg日志", "C. 检查显卡驱动", "D. 切换tty"], ["A","B","C","D"], "方法：重启DDE、Xorg日志分析、驱动检查、Ctrl+Alt+F2切tty。");
addMulti(1174, "麒麟操作系统的备份与恢复工具有？", ["A. tar", "B. rsync", "C. dd", "D. 麒麟备份工具"], ["A","B","C","D"], "tar打包，rsync同步，dd镜像，麒麟自带图形备份工具。");
addMulti(1175, "统信UOS的远程管理方式支持？", ["A. SSH", "B. VNC", "C. RDP", "D. Telnet"], ["A","B","C"], "UOS支持SSH命令行、VNC/RDP远程桌面。Telnet明文不安全不推荐。");
addMulti(1176, "麒麟系统中，服务管理的常见操作包括？", ["A. 启动", "B. 停止", "C. 重启", "D. 查看状态"], ["A","B","C","D"], "systemctl start/stop/restart/status 服务名。");
addMulti(1177, "统信UOS的磁盘分区工具包括哪些？", ["A. fdisk", "B. parted", "C. gparted", "D. diskpart"], ["A","B","C"], "fdisk/parted命令行，gparted图形化。diskpart是Windows工具。");
addMulti(1178, "麒麟操作系统的内核升级步骤包含？", ["A. 下载新内核", "B. 安装新内核", "C. 更新引导配置", "D. 重启验证"], ["A","B","C","D"], "升级步骤：下载→安装→update-grub→重启验证。");
addMulti(1179, "统信UOS的日志管理工具有？", ["A. journalctl", "B. logrotate", "C. rsyslog", "D. syslog-ng"], ["A","B","C","D"], "journalctl查systemd日志，logrotate轮转，rsyslog/syslog-ng系统日志服务。");
addMulti(1180, "麒麟系统的权限管理机制包括？", ["A. 传统Unix权限", "B. ACL", "C. 能力机制", "D. SELinux"], ["A","B","C","D"], "权限体系：rwx权限、ACL扩展、capability细粒度授权、SELinux强制访问控制。");

// 国产数据库（海量）（31-45）
addMulti(1181, "海量数据库支持的索引类型包括？", ["A. B-tree", "B. Hash", "C. GIN", "D. GiST"], ["A","B","C","D"], "PostgreSQL/海量支持B-tree、Hash、GIN、GiST、SP-GiST、BRIN等索引。");
addMulti(1182, "海量数据库的备份策略通常包含？", ["A. 全量备份", "B. 增量备份", "C. 差异备份", "D. 实时备份"], ["A","B","C"], "全量+增量+差异是标准策略，实时备份用流复制实现。");
addMulti(1183, "海量数据库的高可用方案有？", ["A. 主从复制", "B. 双机热备", "C. 集群", "D. 分布式"], ["A","B","C","D"], "高可用方案：主从异步/同步、双机热备、Patroni集群、分布式分片。");
addMulti(1184, "海量数据库的优化器可以选择哪些模式？", ["A. 基于规则", "B. 基于成本", "C. 基于遗传", "D. 基于机器学习"], ["B","C"], "PostgreSQL默认CBO成本优化，支持GEQO遗传优化器处理多表JOIN。");
addMulti(1185, "海量数据库的安全特性包括？", ["A. 用户认证", "B. 权限管理", "C. 数据加密", "D. 审计日志"], ["A","B","C","D"], "安全体系：SCRAM认证、RBAC权限、TDE加密、审计日志。");
addMulti(1186, "海量数据库中，查看性能的视图有？", ["A. pg_stat_database", "B. pg_stat_user_tables", "C. pg_stat_activity", "D. pg_stat_replication"], ["A","B","C","D"], "性能视图：数据库统计、表统计、活动连接、复制状态。");
addMulti(1187, "海量数据库的并发控制技术包括？", ["A. MVCC", "B. 锁机制", "C. 乐观并发控制", "D. 悲观并发控制"], ["A","B"], "主要使用MVCC+锁机制，乐观并发控制通过SSI实现。");
addMulti(1188, "海量数据库支持的数据类型类别有？", ["A. 数值型", "B. 字符型", "C. 日期时间型", "D. 二进制型"], ["A","B","C","D"], "完整数据类型支持：数值、字符串、日期时间、二进制大对象等。");
addMulti(1189, "海量数据库的迁移工具应具备哪些功能？", ["A. 结构迁移", "B. 数据迁移", "C. 增量同步", "D. 数据校验"], ["A","B","C","D"], "迁移工具四核心：结构迁移、全量/增量同步、一致性校验。");
addMulti(1190, "海量数据库的分区策略包括？", ["A. 范围分区", "B. 列表分区", "C. 哈希分区", "D. 复合分区"], ["A","B","C","D"], "支持范围、列表、哈希三种基础分区及复合分区。");
addMulti(1191, "海量数据库的审计功能可以记录哪些操作？", ["A. 登录", "B. DDL", "C. DML", "D. DCL"], ["A","B","C","D"], "审计可记录登录/登出、DDL表结构变更、DML数据操作、DCL权限变更。");
addMulti(1192, "海量数据库的锁等待排查方法有？", ["A. 查看锁信息视图", "B. 分析慢查询", "C. 使用pg_locks", "D. 启用调试日志"], ["A","C"], "pg_locks查看锁信息，结合pg_stat_activity定位阻塞会话。");
addMulti(1193, "海量数据库的闪回查询支持哪些粒度？", ["A. 表", "B. 行", "C. 事务", "D. 数据库"], ["A","B"], "支持表级和时间点闪回，行级和事务级通过MVCC实现。");
addMulti(1194, "海量数据库的自动存储管理特性包括？", ["A. 自动扩展", "B. 条带化", "C. 镜像", "D. 自动负载均衡"], ["A","B","C","D"], "ASM特性：表空间自动扩展、条带化IO、数据镜像、自动负载均衡。");
addMulti(1195, "海量数据库与Oracle的兼容性体现在哪些方面？", ["A. 语法", "B. 数据类型", "C. PL/SQL", "D. 系统视图"], ["A","B","C"], "兼容Oracle语法、数据类型、PL/SQL；系统视图有差异需适配。");

addMulti(1197, "中创中间件的性能调优参数包括？", ["A. 线程池大小", "B. 连接池配置", "C. JVM参数", "D. IO缓冲区大小"], ["A","B","C","D"], "调优四维度：工作线程数、数据库连接池、JVM堆、IO缓冲区。");
addMulti(1198, "中创中间件的安全配置可以包括？", ["A. SSL/TLS", "B. 访问控制", "C. 认证机制", "D. 数据加密"], ["A","B","C"], "安全配置：HTTPS加密、IP白名单/角色访问控制、JAAS认证。");
addMulti(1199, "中创中间件的监控方式有？", ["A. JMX", "B. SNMP", "C. 日志分析", "D. API接口"], ["A","B","C","D"], "JMX管理，SNMP监控，日志分析，REST API查询。");
addMulti(1200, "中创中间件部署时常见的错误码含义？", ["A. 端口冲突", "B. 内存不足", "C. 配置文件错误", "D. License过期"], ["A","B","C","D"], "常见错误：端口冲突、OOM、配置错误、License过期。");
addMulti(1201, "中创中间件的连接器类型支持？", ["A. HTTP", "B. AJP", "C. HTTPS", "D. WebSocket"], ["A","B","C","D"], "Connector支持HTTP/HTTPS、AJP协议、WebSocket长连接。");
addMulti(1202, "中创中间件的日志级别可以设置为？", ["A. ERROR", "B. WARN", "C. INFO", "D. DEBUG"], ["A","B","C","D"], "日志级别从高到低：ERROR→WARN→INFO→DEBUG→TRACE。");
addMulti(1203, "中创中间件的热部署限制条件有？", ["A. 类加载器隔离", "B. 内存泄漏风险", "C. 事务状态丢失", "D. 不支持所有资源类型"], ["A","B","C","D"], "限制：类加载器问题、PermGen/元空间泄漏、事务中断、部分资源需重启。");
addMulti(1204, "中创中间件与Spring Boot集成的注意事项有？", ["A. 内嵌容器冲突", "B. 依赖版本兼容", "C. 配置文件合并", "D. 安全管理"], ["A","B","C","D"], "集成注意：排除内嵌Tomcat、版本对齐、配置合并、安全适配。");
addMulti(1205, "中创中间件的跨域配置方法有？", ["A. CORS过滤器", "B. Nginx代理", "C. 修改配置文件", "D. 代码中添加头信息"], ["A","B","C","D"], "方法：CORS Filter、Nginx反向代理、server.xml配置、代码设置响应头。");
addMulti(1206, "中创中间件的会话保持机制包括？", ["A. Cookie", "B. URL重写", "C. Session复制", "D. 粘性会话"], ["A","B","C","D"], "会话保持：Cookie会话标识、URL重写、多节点复制、负载均衡粘性会话。");
addMulti(1207, "中创中间件的类加载隔离策略有？", ["A. 独立类加载器", "B. 共享类加载器", "C. 父子委托", "D. 全隔离"], ["A","B","C"], "类加载架构：Common共享、Catalina独立、应用隔离，双亲委托机制。");
addMulti(1208, "中创中间件的管理命令行工具有哪些？", ["A. 自带的CLI脚本", "B. JMX命令行", "C. REST API", "D. 无命令行工具"], ["A","B","C"], "提供CLI脚本、JMX客户端、REST API管理接口。");
addMulti(1209, "中创中间件的内存溢出排查步骤包含？", ["A. 查看GC日志", "B. 分析堆转储", "C. 检查代码", "D. 增加内存"], ["A","B","C"], "步骤：启用GC日志、-XX:+HeapDumpOnOutOfMemoryError分析、代码审查。");
addMulti(1210, "中创中间件的License管理要点有？", ["A. 安装License文件", "B. 检查License有效期", "C. 监控并发用户数", "D. License过期处理"], ["A","B","C","D"], "License管理：安装激活、有效期监控、并发数管理、过期降级处理。");

// 迁移流程与兼容性、性能、故障（61-75）
addMulti(1211, "应用迁移评估阶段需要分析的内容包括？", ["A. 硬件兼容性", "B. 软件依赖", "C. 代码改动量", "D. 迁移成本"], ["A","B","C","D"], "评估四维度：硬件适配、依赖分析、代码改造量、成本估算。");
addMulti(1212, "迁移方案设计中必须包含的章节有？", ["A. 迁移范围", "B. 迁移步骤", "C. 回退计划", "D. 时间安排"], ["A","B","C","D"], "方案必含：范围界定、详细步骤、回退预案、时间计划。");
addMulti(1213, "数据迁移的常见策略有？", ["A. 停机迁移", "B. 在线迁移", "C. 批量迁移", "D. 增量迁移"], ["A","B","C","D"], "策略：停机全量迁移、在线不停机、分批迁移、全量+增量组合。");
addMulti(1214, "迁移测试的内容通常包括？", ["A. 功能测试", "B. 性能测试", "C. 安全测试", "D. 兼容性测试"], ["A","B","C","D"], "测试体系：功能、性能、安全、兼容性四类。");
addMulti(1215, "迁移过程中的风险点可能有？", ["A. 数据丢失", "B. 兼容性问题", "C. 性能下降", "D. 迁移超时"], ["A","B","C","D"], "风险点：数据一致性、兼容性故障、性能回退、时间超限。");
addMulti(1216, "兼容性验证的测试类型包括？", ["A. 接口兼容性", "B. 数据兼容性", "C. 平台兼容性", "D. 浏览器兼容性"], ["A","B","C","D"], "兼容性：API接口、数据格式、OS/硬件平台、浏览器客户端。");
addMulti(1217, "性能调优的常见切入点有？", ["A. SQL优化", "B. 中间件参数调优", "C. JVM调优", "D. 硬件升级"], ["A","B","C","D"], "调优路径：SQL→中间件→JVM→硬件，自顶向下。");
addMulti(1218, "故障排查的常规步骤包括？", ["A. 现象确认", "B. 日志分析", "C. 原因定位", "D. 解决方案验证"], ["A","B","C","D"], "排查步骤：确认现象→分析日志→定位根因→验证修复。");
addMulti(1219, "迁移回滚的触发条件通常有？", ["A. 迁移失败", "B. 验证不通过", "C. 出现严重Bug", "D. 超时无法完成"], ["A","B","C","D"], "触发回滚：迁移失败、验收不通过、P0/P1故障、超时。");

    addJudge(401, "龙芯处理器采用的是ARM架构。", false, "龙芯3A5000采用自主LoongArch指令集，早期3A4000及以前使用MIPS，从未使用ARM架构。");
addJudge(402, "飞腾处理器主要用于桌面和服务器领域。", true, "飞腾产品线覆盖桌面CPU（D2000）、服务器CPU（S2500）、嵌入式FT-2000/4，应用广泛。");

addJudge(406, "'cat /etc/os-release'可以查看操作系统发行版信息。", true, "该文件包含ID、NAME、VERSION、PRETTY_NAME等标准发行版信息。");

addJudge(408, "海量数据库不支持SQL语句执行。", false, "海量数据库完全支持SQL-92/99标准，兼容PostgreSQL语法，支持DDL/DML/DQL。");

addJudge(413, "数据源配置中，JDBC驱动类必须正确匹配数据库类型。", true, "不同数据库驱动类不同：Oracle用oracle.jdbc.OracleDriver，MySQL用com.mysql.cj.jdbc.Driver，错误则无法连接。");
addJudge(414, "应用软件迁移的第一步是编写新功能代码。", false, "第一步应为环境评估和兼容性分析，确认需修改的范围后再编码，避免盲目开发。");
addJudge(415, "'迁移适配'是指不做任何修改直接运行。", false, "适配通常需要修改配置、编译源码、替换库、调整SQL等，极少情况零修改。");
addJudge(416, "迁移评估应包含硬件资源、软件依赖、网络环境。", true, "评估三维度：硬件（CPU架构、内存）、软件（OS版本、依赖库版本）、网络（端口连通性、带宽）。");
addJudge(417, "数据迁移必须在业务高峰期执行以减少影响。", false, "迁移应选业务低谷窗口期执行，降低对用户影响，并预留回滚时间。");
addJudge(418, "兼容性验证应涵盖功能、界面、数据一致性三个方面。", true, "功能可用性、UI显示正常、数据完整准确是兼容性验证核心。");
addJudge(419, "'性能调优'是迁移完成后必须进行的步骤。", true, "迁移后性能可能下降，必须经过压测和调优才能上线，包括JVM、连接池、SQL优化。");
addJudge(420, "若出现'ClassNotFoundException'，一定是网络问题。", false, "该异常表示JVM类路径中找不到指定类，通常是缺少JAR包或类名拼写错误，与网络无关。");
addJudge(421, "'Segmentation fault'通常是内存访问越界或调用不兼容库引起的。", true, "段错误常见于指针错误、数组越界、或x86库在ARM上运行导致指令非法。");
addJudge(422, "Linux系统中，ps -ef | grep java可用于查看Java进程。", true, "ps -ef列出所有进程，通过grep过滤出包含java的进程行，是常用排查命令。");
addJudge(423, "netstat -tlnp可以查看监听端口。", true, "参数含义：-t TCP端口，-l 监听状态，-n 数字显示，-p 显示进程PID。");
addJudge(424, "在国产环境中，可以完全忽略安全加固。", false, "信创环境同样面临安全威胁，必须进行基线加固：最小权限、密码策略、日志审计等。");
addJudge(425, "中创中间件默认监听端口是8080。", true, "HTTP服务默认8080，管理控制台另用9060，可配置修改。");
addJudge(426, "'JNDI'是用来查找资源的命名服务，常用于数据库连接。", true, "Java Naming and Directory Interface，中间件中通过JNDI获取数据源、EJB等资源。");
addJudge(427, "迁移文档不需要包含回退方案。", false, "回退方案是迁移文档的强制章节，规定异常时如何快速恢复原系统。");
addJudge(428, "Oracle数据库属于国产数据库。", false, "Oracle为美国甲骨文公司产品，非国产。国产代表有达梦、金仓、海量数据、GaussDB。");
addJudge(429, "达梦数据库是国产数据库的一种。", true, "武汉达梦公司产品，国产数据库市场份额领先，源自华中科技大学数据库团队。");
addJudge(430, "若迁移失败，应立即删除所有数据重新开始。", false, "应执行预先制定的回滚方案，恢复旧系统，而非删除数据导致不可逆损失。");
addJudge(431, "调整JVM参数是性能调优的重要手段。", true, "如-Xmx设置最大堆、-Xms初始堆、-XX:+UseG1GC等，直接影响GC和吞吐量。");
addJudge(432, "'连接池'设置过小可能导致请求排队阻塞。", true, "连接池上限不足时，高并发请求等待获取连接，响应时间急剧上升。");
addJudge(433, "静态网页无需中间件即可运行。", true, "纯HTML/CSS/JS文件可通过HTTP服务器直接访问，不依赖Java中间件。");
addJudge(434, "在Linux系统中，sudo命令可临时获得管理员权限。", true, "sudo赋予普通用户执行特定命令的root权限，通过/etc/sudoers配置。");
addJudge(435, "系统日志文件一般保存在/var/log目录下。", true, "Linux标准路径：/var/log/messages、/var/log/secure、应用日志也常置于此。");
addJudge(436, "'字符集不一致'可能导致数据迁移后乱码。", true, "源库UTF-8、目标库GBK时，中文等非ASCII字符转换错误显示为乱码。");
addJudge(437, "信创迁移不需要测试环境，可以直接上线。", false, "必须在独立测试环境完成功能、性能、兼容性验证后，才能割接生产。");
addJudge(438, "麒麟和统信都支持命令行和图形界面操作。", true, "两者均为完整Linux发行版，提供命令行Shell和图形桌面环境（UKUI/麒麟桌面）。");
addJudge(439, "中创中间件支持通过Web控制台管理应用。", true, "提供Web管理界面，可部署应用、配置数据源、监控线程池等。");
addJudge(440, "企业应用迁移必须一次性完成，不可分阶段。", false, "可采用分阶段迁移：先非核心模块、再核心模块；或灰度切流，降低风险。");
addJudge(441, "'最小改动原则'是指尽可能不修改原有代码，通过配置和替换实现适配。", true, "优先通过配置文件、环境变量、动态库替换解决问题，避免修改业务代码。");
addJudge(442, "若出现'端口被占用'，可通过kill进程或更换端口解决。", true, "两种常用方法：终止占用进程（kill -9 PID）或修改应用监听端口配置。");
addJudge(443, "所有第三方jar包在迁移后都能直接使用。", false, "部分jar包包含本地库（.so/.dll）或依赖特定CPU指令，需重新获取ARM版。");
addJudge(444, "海量数据库支持图形化管理工具。", true, "提供HighGo Manager图形工具，也兼容pgAdmin等第三方PG管理工具。");
addJudge(445, "应用迁移后只需验证登录功能即可。", false, "必须全功能回归测试，包括增删改查、报表、定时任务、接口等核心流程。");
addJudge(446, "数据库备份应在迁移前执行，作为安全措施。", true, "迁移前置备是标准操作，防止迁移过程中数据丢失或损坏。");
addJudge(447, "性能测试工具如JMeter可用于信创环境下的压力测试。", true, "JMeter基于Java跨平台，可在麒麟/统信上运行，测试HTTP/数据库等性能。");
addJudge(448, "中间件启动脚本通常位于bin目录下，如startup.sh。", true, "标准目录结构：bin/含启动停止脚本，lib/含依赖JAR，conf/含配置文件。");
addJudge(449, "信创迁移的最终目标是实现安全可控、自主可用、稳定高效。", true, "信创核心目标：信息安全、供应链自主、系统可用性、性能达标。");
addJudge(450, "迁移适配中所有存储过程无需修改即可运行。", false, "不同数据库PL/SQL方言差异大，如Oracle转HighGo需改写语法、函数、异常处理。");
addJudge(731, "龙芯处理器的LoongArch指令集完全自主可控，不依赖国外授权。", true, "LoongArch是龙芯自主研发的指令集架构，不依赖MIPS、ARM、x86等国外授权。");
addJudge(732, "飞腾处理器基于ARMv8架构，支持64位计算。", true, "飞腾基于ARMv8.2架构，支持64位计算，代表产品FT-2000/4、S2500。");
addJudge(733, "麒麟操作系统仅支持x86架构的服务器。", false, "麒麟服务器版支持x86、ARM（飞腾）、LoongArch（龙芯）等多种国产CPU架构。");
addJudge(734, "统信UOS桌面版和服务器版均适配龙芯、飞腾等国产CPU。", true, "统信UOS适配龙芯、飞腾、鲲鹏、海光、兆芯等多种国产CPU架构。");
addJudge(735, "在麒麟系统中，yum命令用于安装RPM格式的软件包。", true, "麒麟服务器版基于RPM系，使用yum/dnf安装和管理RPM包。");
addJudge(736, "统信UOS中，dpkg -i命令用于安装deb格式的软件包。", true, "统信UOS基于Debian，dpkg -i用于安装本地deb软件包。");
addJudge(737, "海量数据库兼容PostgreSQL的SQL语法与协议。", true, "海量数据库基于PostgreSQL内核，完全兼容PG语法、协议和生态工具。");
addJudge(738, "海量数据库的默认端口是3306，与MySQL一致。", false, "海量数据库继承PostgreSQL，默认端口5432，3306是MySQL端口。");
addJudge(739, "在海量数据库中，使用\\q命令可以退出psql客户端。", true, "psql元命令\\q（quit）用于退出psql交互式客户端。");
addJudge(740, "中创InforSuite中间件仅支持部署Java Web应用。", false, "中创中间件主要支持Java Web，但也支持Web服务、负载均衡等扩展功能。");
addJudge(741, "中创中间件的webapps目录是WAR包部署的默认目录。", true, "类似Tomcat，webapps是自动部署目录，放入WAR包后自动解压部署。");
addJudge(742, "中创中间件中，配置数据源时，JDBC驱动类名必须与数据库类型匹配。", true, "驱动类名必须匹配：达梦用dm.jdbc.driver.DmDriver，PostgreSQL用org.postgresql.Driver。");
addJudge(743, "应用系统迁移到信创环境时，无需进行任何评估，直接部署即可。", false, "迁移前必须进行环境评估，分析依赖和兼容性问题，否则后期返工成本高。");
addJudge(744, "应用迁移的'最小改动原则'是指尽量不修改业务核心代码，优先通过配置适配。", true, "优先通过配置文件、环境变量、动态库替换解决问题，避免修改业务代码。");
addJudge(745, "数据迁移前，必须对源数据进行完整备份，防止数据丢失。", true, "迁移前置备是标准操作，确保迁移失败时可快速恢复。");
addJudge(746, "兼容性验证只需测试应用的登录功能即可，无需验证其他业务流程。", false, "必须全功能回归测试，登录只是最基础的验证，核心业务流程都需要测试。");
addJudge(747, "性能调优中，JVM的-Xmx参数设置越大越好，无需考虑服务器物理内存。", false, "-Xmx不能超过物理内存，过大会导致系统SWAP甚至OOM Killer。");
addJudge(748, "数据库连接池的最大连接数设置过小，会导致应用请求排队阻塞。", true, "连接池上限不足时，高并发请求等待连接，响应时间急剧上升。");
addJudge(749, "应用迁移后出现乱码，通常是因为源环境与目标环境的字符集不一致。", true, "字符集不一致（如UTF-8 vs GBK）是乱码最常见的原因。");
addJudge(750, "故障排查时，查看应用日志是定位问题的重要手段。", true, "日志记录错误堆栈、异常信息，是故障定位的第一手资料。");
addJudge(751, "麒麟系统中，systemctl stop firewalld命令可以临时关闭防火墙。", true, "systemctl stop firewalld临时关闭防火墙，重启后恢复。");
addJudge(752, "统信UOS中，tail -f命令可以实时查看日志文件的更新内容。", true, "tail -f实时追踪文件新增内容，是查看动态日志的常用命令。");
addJudge(753, "在海量数据库中，CREATE TABLE命令用于创建新表。", true, "CREATE TABLE是SQL标准建表命令，所有关系型数据库通用。");
addJudge(754, "中创中间件中，修改配置文件后，无需重启服务即可生效。", false, "大多数配置文件修改后需要重启中间件服务才能生效。");
addJudge(755, "应用迁移过程中，回退方案是迁移失败时恢复业务的重要保障。", true, "回退方案是迁移的最后一道防线，确保故障时可快速恢复原环境。");
addJudge(756, "龙芯3A5000处理器不支持虚拟化技术。", false, "龙芯3A5000支持硬件虚拟化，可运行KVM等虚拟化方案。");
addJudge(757, "飞腾处理器的性能仅能满足嵌入式场景，无法支持服务器业务。", false, "飞腾S2500服务器CPU达64核，性能可满足企业级服务器业务。");
addJudge(758, "麒麟操作系统由中国电子信息产业集团旗下的麒麟软件研发。", true, "麒麟软件有限公司由中国电子(CEC)主导，负责麒麟OS研发。");
addJudge(759, "统信UOS的图形界面UKUI是完全自主开发的桌面环境。", true, "UKUI（Ultimate Kylin UI）是统信软件自主研发的桌面环境。");
addJudge(760, "在麒麟系统中，使用su -命令可以切换到root用户。", true, "su -完全切换到root用户环境，需知道root密码。");
addJudge(761, "海量数据库不支持事务处理，无法保证数据一致性。", false, "海量数据库基于PostgreSQL，完整支持ACID事务特性。");
addJudge(762, "在海量数据库中，pg_dump命令可以用于备份数据库。", true, "pg_dump是PostgreSQL/海量数据库的逻辑备份工具。");
addJudge(763, "中创中间件的默认管理控制台端口是9090。", true, "中创InforSuite AS管理控制台默认端口9090。");
addJudge(764, "应用迁移中，配置适配仅需要修改数据库连接字符串即可，无需调整其他参数。", false, "配置适配需全面调整：数据库连接、中间件端口、日志路径、缓存等多项参数。");
addJudge(765, "兼容性验证中，数据一致性验证需要对比源环境与目标环境的关键业务数据。", true, "抽样对比或全量对比关键业务数据，确保迁移后数据一致。");
addJudge(766, "性能调优中，优化SQL语句是提升数据库性能的重要方式。", true, "SQL优化通过索引、避免全表扫描等方式大幅降低查询时间。");
addJudge(767, "故障排查中，netstat命令可以查看端口占用情况。", true, "netstat -tlnp显示TCP监听端口及占用进程。");
addJudge(768, "应用迁移后，无需进行性能验证，只要功能正常即可上线。", false, "功能正常不代表性能达标，必须进行性能压测确保满足业务要求。");
addJudge(769, "中创中间件中，配置JVM参数的文件是setenv.sh。", true, "bin/setenv.sh用于设置JVM参数如-Xms、-Xmx。");
addJudge(770, "海量数据库中，\\du命令可以查看所有用户。", true, "psql中\\du列出所有数据库用户及其属性。");
addJudge(771, "龙芯处理器的指令集生态已经逐步完善，支持主流Linux发行版。", true, "LoongArch已被Linux内核、GCC、LLVM等主流开源社区支持，生态持续完善。");
addJudge(772, "飞腾处理器的服务器产品支持虚拟化、高可用等企业级特性。", true, "飞腾服务器CPU支持硬件虚拟化，可部署KVM、容器等企业级方案。");
addJudge(773, "麒麟系统的服务器版支持集群部署，适用于企业级业务场景。", true, "麒麟服务器版支持高可用集群、负载均衡等企业级特性。");
addJudge(774, "统信UOS中，使用apt update命令可以更新软件包索引。", true, "apt update从仓库更新软件包列表，apt upgrade执行实际升级。");
addJudge(775, "在麒麟系统中，df -h命令可以查看磁盘空间使用情况。", true, "df -h以人类可读格式显示文件系统磁盘空间使用率。");
addJudge(776, "海量数据库中，SELECT * FROM table LIMIT 5;可以查询前5条数据。", true, "PostgreSQL/海量数据库使用LIMIT子句限制返回行数。");
addJudge(777, "中创中间件中，集群部署可以提升系统的高可用性和并发处理能力。", true, "集群通过多节点冗余实现高可用，通过负载均衡提升并发能力。");
addJudge(778, "应用迁移中，依赖库（如JAR包、.so文件）不兼容是常见问题之一。", true, "JAR包版本冲突、动态库架构不匹配（x86 vs ARM）是迁移常见问题。");
addJudge(779, "兼容性验证中，界面验证需要确保页面布局、交互元素与原环境一致。", true, "界面验证确保用户操作体验一致，包括布局、交互、字体等。");
addJudge(780, "性能调优中，调整数据库连接池的最小空闲数可以减少连接创建开销。", true, "保持一定数量的空闲连接，避免高并发时频繁创建新连接。");
addJudge(781, "故障排查中，查看Java进程的命令是ps aux | grep java。", true, "ps aux列出所有进程，grep过滤出包含java的行。");
addJudge(782, "应用迁移中，分阶段迁移可以降低迁移风险，便于逐步验证。", true, "分阶段迁移（先非核心后核心、灰度切流）可有效降低风险。");
addJudge(783, "中创中间件中，修改管理控制台的默认密码是重要的安全加固措施。", true, "修改默认密码防止未授权访问控制台，是基本安全要求。");
addJudge(784, "海量数据库中，启用日志审计可以记录数据库操作，便于故障排查与安全审计。", true, "审计日志记录DDL、DML等操作，满足等保合规和故障溯源需求。");
addJudge(785, "应用迁移文档需要包含迁移步骤、回退方案、验收标准等内容。", true, "迁移文档必备：操作步骤、回退预案、验收标准，缺一不可。");
addJudge(786, "龙芯处理器的性能已经达到主流x86处理器的水平，可满足大多数业务场景。", true, "龙芯3A5000/3C5000性能接近同期x86中低端产品，可满足政务、办公等场景。");
addJudge(787, "麒麟系统中，防火墙默认是开启的，需要配置规则才能允许外部访问。", true, "为安全起见，麒麟默认开启firewalld，需放行业务端口才能访问。");
addJudge(788, "统信UOS中，使用scp命令可以在服务器之间传输文件。", true, "scp基于SSH加密传输，是Linux服务器间文件传输常用命令。");
addJudge(789, "海量数据库中，创建索引可以加速查询操作，但会降低插入/更新性能。", true, "索引加速SELECT，但INSERT/UPDATE/DELETE需同步维护索引，有额外开销。");
addJudge(790, "中创中间件中，webapps目录下的WAR包会被自动部署。", true, "中间件检测到webapps目录新增WAR包时，自动解压部署。");
addJudge(791, "应用迁移中，无需提前备份源环境数据，直接迁移即可。", false, "迁移前必须备份源环境数据和配置，防止迁移失败造成数据丢失。");
addJudge(792, "兼容性验证中，功能验证需要覆盖所有核心业务流程。", true, "功能验证必须全量覆盖，不能只测部分功能就上线。");
addJudge(793, "性能调优中，开启数据库缓存可以提升数据读取性能。", true, "数据库缓存（如shared_buffers）减少磁盘I/O，显著提升读性能。");
addJudge(794, "故障排查中，应用日志中的'ClassNotFoundException'通常表示缺少依赖的JAR包。", true, "该异常表示JVM找不到指定类，通常因JAR包缺失或类路径错误。");
addJudge(795, "中创中间件中，配置数据源时，最大连接数设置过大可能导致数据库资源耗尽。", true, "连接数过大会耗尽数据库连接资源，影响其他应用访问。");
addJudge(796, "海量数据库中，使用\\l命令可以查看所有数据库。", true, "psql元命令\\l列出所有数据库，等同于SELECT datname FROM pg_database。");
addJudge(797, "统信UOS中，系统日志默认存储在/var/log目录下。", true, "Linux标准路径，统信UOS同样遵循，包括/var/log/messages等。");
addJudge(798, "应用迁移完成后，需要持续监控系统运行状态，及时处理问题。", true, "上线后仍需监控性能、日志、告警，保障系统稳定运行。");
addJudge(799, "信创应用迁移的核心目标是实现应用在信创环境下的自主可控与稳定运行。", true, "信创迁移最终目标是在国产平台实现安全、稳定、高效的自主可控运行。");
addJudge(800, "中创中间件支持SSL加密配置，提升应用访问的安全性。", true, "中创中间件可配置HTTPS/SSL证书，实现数据传输加密。");
    addJudge(1226, "龙芯处理器完全兼容x86指令集。", false, "龙芯通过LATS二进制翻译运行x86应用，非硬件原生兼容x86指令集。");
addJudge(1227, "飞腾处理器是基于ARM指令集架构的国产CPU。", true, "飞腾获得ARMv8永久授权，自主研发CPU内核。");
addJudge(1228, "麒麟操作系统是基于Debian开发的。", true, "麒麟桌面版基于Debian，服务器版基于CentOS。");
addJudge(1229, "统信UOS不支持RPM包安装。", false, "UOS基于Debian原生支持deb，rpm需转换或使用alien工具。");
addJudge(1230, "海量数据库不支持存储过程。", false, "海量支持PL/pgSQL存储过程、函数、触发器。");
addJudge(1231, "中创中间件只能在Windows环境下运行。", false, "中创支持Windows和Linux环境，推荐生产使用Linux。");
addJudge(1232, "应用迁移前可以不进行兼容性测试。", false, "兼容性测试是迁移必备环节，验证功能、数据、性能。");
addJudge(1233, "迁移回退计划是可选的。", false, "回退计划是迁移方案必须包含的章节，不可省略。");
addJudge(1234, "龙芯3系列处理器只能用于桌面环境。", false, "3A系列桌面，3C系列服务器，3B系列工作站。");
addJudge(1235, "飞腾处理器支持硬件虚拟化。", true, "飞腾支持ARM Virtualization Extensions硬件虚拟化。");
addJudge(1236, "麒麟操作系统的默认Shell是bash。", true, "麒麟默认/bin/bash作为用户Shell。");
addJudge(1237, "统信UOS的防火墙默认是关闭的。", false, "UOS默认开启firewalld防火墙，需放行业务端口。");
addJudge(1238, "海量数据库的默认端口是3306。", false, "海量基于PostgreSQL，默认端口5432。3306是MySQL端口。");
addJudge(1239, "中创中间件支持热部署。", true, "支持将WAR包放入webapps目录自动热部署。");
addJudge(1240, "迁移完成后可以立即销毁原环境。", false, "需经过试运行期确认稳定后，方可下线原环境。");
addJudge(1241, "性能调优只需要调整中间件参数。", false, "性能调优需多层面：应用代码、SQL、中间件、JVM、操作系统。");
addJudge(1242, "内存溢出时可以通过增加内存永久解决。", false, "增加内存缓解症状，根本解决需修复内存泄漏代码。");
addJudge(1243, "兼容性测试只测试应用功能。", false, "兼容性测试涵盖功能、数据、平台、接口、浏览器等多方面。");
addJudge(1244, "国产CPU的主频一定低于同期Intel CPU。", false, "主频差距缩小，飞腾D2000达2.6GHz，龙芯达2.5GHz。");
addJudge(1245, "统信UOS支持exFAT文件系统。", true, "安装exfat-utils和exfat-fuse包后可读写exFAT格式磁盘。");
addJudge(1246, "麒麟操作系统可以使用apt命令安装软件。", true, "麒麟桌面版基于Debian，支持apt命令。");
addJudge(1247, "海量数据库支持全文索引。", true, "通过GIN索引和tsvector数据类型支持全文检索。");
addJudge(1248, "中创中间件的管理控制台支持远程访问。", true, "可配置远程访问管理控制台，建议绑定IP白名单和SSL。");
addJudge(1249, "迁移演练只需要做一次。", false, "建议多次演练，包括全流程演练和异常场景演练。");
addJudge(1250, "CPU占用率100%一定是CPU性能不足。", false, "可能因死循环、频繁GC、IO等待、系统调用过高导致。");
addJudge(1251, "磁盘IO高时首选更换固态硬盘。", false, "应先分析IO高的原因（慢查询、大文件读写），SSD是最后手段。");
addJudge(1252, "网络丢包率超过1%属于正常范围。", false, "正常网络丢包率应低于0.1%，超过1%严重影响业务。");
addJudge(1253, "应用迁移后必须进行安全测试。", true, "安全测试验证认证、权限、数据加密、漏洞扫描。");
addJudge(1254, "龙芯处理器不支持DDR4内存。", false, "龙芯3A5000/3C5000支持DDR4，3A4000及更早支持DDR3。");
addJudge(1255, "飞腾处理器可以在麒麟系统上运行。", true, "飞腾是麒麟原生支持的硬件平台之一。");
addJudge(1256, "统信UOS的软件商店只能安装商店内的应用。", false, "用户可通过apt安装任意deb包，不限于软件商店。");
addJudge(1257, "海量数据库支持行列混合存储。", true, "支持行存储和列存储（cstore_fdw扩展）。");
addJudge(1258, "中创中间件的默认JVM堆大小为2GB。", false, "默认堆大小取决于平台和版本，通常256MB-1GB。");
addJudge(1259, "迁移方案中不需要包含时间计划表。", false, "时间计划是迁移方案核心内容，细化到小时级任务安排。");
addJudge(1260, "性能测试可以在迁移后进行。", true, "迁移后必须进行性能基准测试，验证达标情况。");

addJudge(1275, "应用迁移项目必须进行压力测试。", true, "压力测试验证性能指标，确保满足生产并发要求。");
// ================= 第六批 多选题（60题，876-935）=================
// 确保总题数为300 (目前已经300)
    // if(questions.length !== 300) console.warn("题目数量异常");
    // 以下为前端交互逻辑 (单选/判断立即判题；多选确认)
    let currentIndex = 0, startTime = Date.now(), timerInterval = null, submitted = false;
    const totalSpan = document.getElementById("totalCount"), answeredSpan = document.getElementById("answeredCount"), timerSpan = document.getElementById("timer");
    const realScoreSpan = document.getElementById("realScore"), maxScoreSpan = document.getElementById("maxScoreSpan"), finalScoreDisplay = document.getElementById("finalScoreDisplay");
    const scoreDetailDiv = document.getElementById("scoreDetail"), navGridDiv = document.getElementById("navGrid"), currentQWrapper = document.getElementById("currentQWrapper"), confirmMultiBtn = document.getElementById("confirmMultiBtn");
    totalSpan.innerText = questions.length; maxScoreSpan.innerText = questions.length;

    function computeScore() { let s=0; for(let q of questions) { if(!q.answered) continue; if(q.type==="single"||q.type==="judge") { if(q.userAnswer===q.correct) s++; } else if(Array.isArray(q.userAnswer)&&Array.isArray(q.correct)&&q.userAnswer.length===q.correct.length&&q.correct.every(c=>q.userAnswer.includes(c))) s++; } return s; }
    function updateStatsUI() { let ac=questions.filter(q=>q.answered).length; answeredSpan.innerText=ac; let sc=computeScore(); realScoreSpan.innerText=sc; if(submitted) finalScoreDisplay.innerText=sc+" / "+questions.length; renderNav(); }
    function confirmMultiAnswer() { let q=questions[currentIndex]; if(!q||q.type!=="multi"||q.answered) return; let checked=Array.from(document.querySelectorAll('#optionsContainer input:checked')).map(cb=>cb.value); if(checked.length===0){alert("请至少选择一个选项");return;} q.userAnswer=checked; q.answered=true; updateStatsUI(); renderCurrentQuestion(); }
    function renderCurrentQuestion() { let q=questions[currentIndex]; if(!q) return; let selected=q.userAnswer, isMulti=q.type==="multi"; let html=`<div class="q-card"><div class="q-title">题目 ${currentIndex+1}/${questions.length}  <span>${q.type==='single'?'🔘单选':(q.type==='multi'?'☑️多选':'🔍判断')}</span></div><div class="q-text">${escapeHtml(q.text)}</div><div class="options" id="optionsContainer">`;
        for(let opt of q.options){ let letter=opt.charAt(0), optText=opt.substring(2), isCorrect=(q.type!=="multi")?(letter===q.correct):q.correct.includes(letter); let isUser=(q.type!=="multi")?(selected===letter):(Array.isArray(selected)&&selected.includes(letter)); let addClass="",disabled="",checked="";
            if(q.answered){ disabled="disabled"; if(isCorrect) addClass="correct-answer-display"; if(isUser&&!isCorrect) addClass="wrong-highlight"; if(isUser&&isCorrect) addClass="correct-highlight"; checked=isUser?"checked":""; } else { checked=isUser?"checked":""; }
            html+=`<div class="option ${addClass}"><input type="${isMulti?'checkbox':'radio'}" name="question" value="${letter}" id="opt_${letter}" ${checked} ${disabled}><label for="opt_${letter}"><strong>${letter}</strong>. ${escapeHtml(optText)}</label></div>`;
        } html+=`</div>`;
        if(q.answered){ let isCurrCorrect=(q.type!=="multi")?(q.userAnswer===q.correct):(Array.isArray(q.userAnswer)&&Array.isArray(q.correct)&&q.userAnswer.length===q.correct.length&&q.correct.every(c=>q.userAnswer.includes(c))); let statusText=isCurrCorrect?"✓正确":"✗错误"; let statusClass=isCurrCorrect?"feedback-correct":"feedback-wrong"; let correctStr=(q.type==="multi")?q.correct.join("、"):q.correct; html+=`<div class="feedback-area"><div class="${statusClass}">${statusText}</div><div><strong>📖答案：</strong> ${escapeHtml(correctStr)}</div><div><strong>💡解析：</strong> ${escapeHtml(q.explanation)}</div></div>`; }
        else{ html+=`<div class="feedback-area feedback-neutral">${isMulti?"✅ 勾选所有正确选项后点击「确认答案」":"⚡ 点击选项立即判题"}</div>`; } html+=`</div>`; currentQWrapper.innerHTML=html;
        if(q.type!=="multi"&&!q.answered){ document.querySelectorAll('input[name="question"]').forEach(radio=>radio.addEventListener('change',(e)=>{ if(e.target.checked){ q.userAnswer=e.target.value; q.answered=true; updateStatsUI(); renderCurrentQuestion(); } })); }
        confirmMultiBtn.style.display=(q.type==="multi"&&!q.answered)?"inline-flex":"none";
        if(!q.answered&&q.type==="multi"&&Array.isArray(selected)){ let boxes=document.querySelectorAll('#optionsContainer input[type="checkbox"]'); boxes.forEach(cb=>{ if(selected.includes(cb.value)) cb.checked=true; cb.addEventListener('change',()=>{ questions[currentIndex].userAnswer=Array.from(document.querySelectorAll('#optionsContainer input:checked')).map(c=>c.value); }); }); }
    }
    function escapeHtml(str){ if(!str) return ''; return str.replace(/[&<>]/g,m=>m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
    function renderNav(){ navGridDiv.innerHTML=''; for(let i=0;i<questions.length;i++){ let btn=document.createElement('div'); btn.classList.add('nav-btn'); if(questions[i].answered) btn.classList.add('answered'); if(i===currentIndex) btn.classList.add('current'); btn.innerText=i+1; btn.addEventListener('click',((idx)=>()=>{ currentIndex=idx; renderCurrentQuestion(); renderNav(); })(i)); navGridDiv.appendChild(btn); } }
    function updateTimerDisplay(){ if(submitted) return; let e=Math.floor((Date.now()-startTime)/1000),h=Math.floor(e/3600),m=Math.floor((e%3600)/60),s=e%60; timerSpan.innerText=`${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; }
    function startTimer(){ if(timerInterval) clearInterval(timerInterval); timerInterval=setInterval(updateTimerDisplay,1000); }
    function submitExam(){ if(submitted) return; submitted=true; clearInterval(timerInterval); let sc=computeScore(); finalScoreDisplay.innerText=sc+" / "+questions.length; scoreDetailDiv.innerHTML=`✅ 最终得分率 ${Math.round(sc/questions.length*100)}% ，答对 ${sc} 题。`; realScoreSpan.innerText=sc; }
    function resetAll(){ if(confirm("重置所有进度？")){ questions.forEach(q=>{ q.userAnswer=null; q.answered=false; }); currentIndex=0; startTime=Date.now(); submitted=false; clearInterval(timerInterval); startTimer(); renderCurrentQuestion(); updateStatsUI(); finalScoreDisplay.innerText="—"; scoreDetailDiv.innerHTML=""; renderNav(); } }
    document.getElementById("prevBtn").addEventListener("click",()=>{ if(currentIndex>0){ currentIndex--; renderCurrentQuestion(); renderNav(); } });
    document.getElementById("nextBtn").addEventListener("click",()=>{ if(currentIndex<questions.length-1){ currentIndex++; renderCurrentQuestion(); renderNav(); } });
    document.getElementById("submitBtn").addEventListener("click",submitExam);
    document.getElementById("resetAllBtn").addEventListener("click",resetAll);
    confirmMultiBtn.addEventListener("click",confirmMultiAnswer);
    startTimer(); renderCurrentQuestion(); updateStatsUI(); renderNav();
</script>
</body>
</html>
